<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discografia Britney Spears</title>
	
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --accent-color: #fa233b; 
            --border-radius: 12px;
            --player-bg: rgba(24, 24, 24, 0.75); 
            --glass-bg: rgba(22, 22, 22, 0.5);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --blur-overlay-opacity: 0; 
        }

        /* AJUSTES PARA MODO CLARO */
        body.light-mode { 
            --bg-color: #f5f5f7; 
            --text-main: #1d1d1f; 
            --card-bg: #ffffff;
            --text-muted: #86868b;
            --player-bg: rgba(255, 255, 255, 0.85); 
        }
        body.light-mode .album-card { border: 1px solid #e5e5e7; }
        body.light-mode .album-card-title { color: #1d1d1f; }
        body.light-mode .album-card-artist { color: #86868b; }
        body.light-mode .top-nav-bar { background-color: transparent; }
        body.light-mode .modal-content { background-color: #ffffff; color: #1d1d1f; border: 1px solid #e5e5e7; }
        body.light-mode .modal-text { color: #515154; }
        body.light-mode .modal-close { color: #1d1d1f; }
        body.light-mode .track-row { border-bottom: 1px solid rgba(0,0,0,0.05); }
        body.light-mode .track-row:hover { background-color: rgba(0,0,0,0.03); }
        body.light-mode .floating-player-wrapper { border: 1px solid rgba(0, 0, 0, 0.08); color: #1d1d1f; }
        body.light-mode .control-btn, body.light-mode .volume-btn { color: #1d1d1f; }
        body.light-mode .control-btn:not(.active):not(.play-pause-btn) { color: #515154; }
        body.light-mode .repeat-btn-text, body.light-mode .shuffle-btn { color: #1d1d1f !important; }
        body.light-mode .timeline-container { color: #86868b; }
        body.light-mode .progress-bar-bg { background-color: rgba(0, 0, 0, 0.1); }
        body.light-mode .progress-bar-fill { background-color: var(--accent-color); }
        body.light-mode .version-card { background-color: #eaeaea; }
        body.light-mode .version-card span { color: #1d1d1f; }
        body.light-mode .version-card:hover { background-color: #dddddd; }

        /* AJUSTES DE CONTRASTE NO MODO ARTE DO ÁLBUM */
        body.bg-art-active { --text-muted: #e1e1e6; }
        body.bg-art-active.light-mode { --text-muted: #2c2c2e; }
        body.bg-art-active .album-meta { color: var(--text-main) !important; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
        body.bg-art-active .track-number { color: var(--text-main) !important; font-weight: bold; }

        /* BACKDROP */
        .dynamic-blur-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            filter: blur(8px) brightness(0.8) saturate(1.2); transform: scale(1.1); 
            z-index: -2; opacity: var(--blur-overlay-opacity);
            transition: opacity 0.8s ease, background-image 0.8s ease;
        }
        body.light-mode .dynamic-blur-bg { filter: blur(8px) brightness(1.2) saturate(1.2); }
        .dynamic-blur-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(18, 18, 18, 0.4); z-index: -1;
            opacity: var(--blur-overlay-opacity); transition: opacity 0.8s ease;
        }
        body.light-mode .dynamic-blur-overlay { background: rgba(255, 255, 255, 0.3); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* NOVO DASHBOARD: CARROSSEL 3D */
        .dashboard-section { display: block; padding: 40px; height: 100%; position: relative; overflow: hidden; }
        .section-header-bar { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; z-index: 10; position: relative; }
        .section-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; text-align: center; }
        
        .carousel-container {
            position: relative;
            width: 100%;
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 10px;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 100%;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: var(--transition);
        }
        body.light-mode .carousel-nav { background: rgba(255, 255, 255, 0.7); color: #1d1d1f; border: 1px solid rgba(0, 0, 0, 0.1); }
        .carousel-nav:hover { background: var(--accent-color); color: white; transform: translateY(-50%) scale(1.1); border-color: transparent; }
        
        .carousel-nav.prev { left: 40px; }
        .carousel-nav.next { right: 40px; }

        /* Cards do Álbum no Carrossel */
        .album-card { 
            position: absolute;
            top: 50%;
            left: 50%;
            width: 280px; /* Tamanho base aumentado */
            transform: translate(-50%, -50%);
            background-color: var(--card-bg); 
            padding: 18px; 
            border-radius: var(--border-radius); 
            cursor: pointer; 
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.5s, z-index 0.5s, background-color 0.3s, border-color 0.3s;
            border: 1px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .album-card:hover { background-color: #2d2d2d; border-color: #3a3a3c; }
        body.light-mode .album-card:hover { background-color: #f0f0f2; border-color: #ccc; }
        body.bg-art-active .album-card { background-color: rgba(36, 36, 36, 0.15); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.05); }
        body.bg-art-active.light-mode .album-card { background-color: rgba(255, 255, 255, 0.25); border: 1px solid rgba(0,0,0,0.03); }
        
        .album-art-wrapper { position: relative; width: 100%; padding-top: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .album-art-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .album-card-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; text-align: center; }
        .album-card-artist { font-size: 14px; color: var(--text-muted); text-align: center; }

        /* DETALHES DO ÁLBUM E LAYOUT DESKTOP */
        .album-detail-section { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-nav-bar { background-color: var(--bg-color); padding: 20px 40px 10px 40px; flex-shrink: 0; transition: background-color 0.3s; z-index: 10; }
        body.bg-art-active .top-nav-bar { background-color: transparent; }
        .back-btn { background: rgba(35, 35, 35, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: var(--transition); }
        .back-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.02); }
        body.light-mode .back-btn { background: rgba(240, 240, 240, 0.95); border: 1px solid rgba(0, 0, 0, 0.08); }

        .detail-split-container { display: flex; flex: 1; overflow: hidden; padding: 10px 40px 30px 40px; gap: 50px; }
        
        .left-album-block { width: 480px; flex-shrink: 0; display: flex; flex-direction: column; }
        .album-media-container { width: 100%; padding-top: 100%; position: relative; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); overflow: hidden; background-color: #000; }
        .album-art, .album-video { width: 100% !important; height: 100% !important; object-fit: cover !important; position: absolute; top: 0; left: 0; display: block; }
        .album-video { display: none; }

        .right-content-block { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .album-header-top { display: flex; flex-direction: column; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        body.light-mode .album-header-top { border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        
        .album-title-header { font-size: 29px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
        
        .album-header-body { display: flex; flex: 1; overflow: hidden; gap: 30px; }
        
        .album-info-side { display: flex; flex-direction: column; min-width: 170px; flex-shrink: 0; }
        .album-artist-header { font-size: 18px; color: var(--accent-color); font-weight: 600; margin-bottom: 8px; }
        .album-meta { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
        
        .play-album-btn { background-color: var(--accent-color); color: #ffffff; border: none; padding: 10px 24px; border-radius: 30px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; width: fit-content; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(250, 35, 59, 0.4); }
        .play-album-btn:hover { transform: scale(1.04); }

        .right-tracklist-block { flex: 1; overflow-y: auto; padding-right: 15px; margin-bottom: 15px; }
        body.bg-art-active .right-tracklist-block { background: rgba(35, 35, 35, 0.15); backdrop-filter: blur(2px); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.04); }
        body.bg-art-active.light-mode .right-tracklist-block { background: rgba(255, 255, 255, 0.25); }

        .tracklist { display: flex; flex-direction: column; width: 100%; }
        .track-row { display: flex; align-items: center; padding: 14px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer; border-radius: 6px; transition: background-color 0.2s; }
        .track-row:hover { background-color: rgba(255, 255, 255, 0.04); }
        .track-row.playing { background-color: var(--accent-color) !important; color: #ffffff; }
        
        .track-number { width: 40px; color: var(--text-muted); font-size: 12px; }
        .track-row.playing .track-number { color: rgba(255, 255, 255, 0.7); }
        .track-title { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .equalizer { display: none; align-items: flex-end; gap: 2px; width: 20px; height: 15px; margin-right: 20px; }
        .track-row.playing .equalizer { display: flex; }
        .track-row.playing .track-number { display: none; }
        .eq-bar { width: 3px; background-color: #ffffff; animation: bounce 0.8s ease-in-out infinite alternate; border-radius: 1px; }
        .eq-bar-1 { height: 30%; animation-delay: 0.1s; }
        .eq-bar-2 { height: 100%; animation-delay: 0.3s; }
        .eq-bar-3 { height: 60%; animation-delay: 0.5s; }
        @keyframes bounce { 10% { transform: scaleY(0.3); } 100% { transform: scaleY(1.1); } }

        /* PLAYER FLUTUANTE (No PC, ele fica embaixo da lista de músicas na coluna direita) */
        .floating-player-wrapper {
            position: relative; width: 100%; background-color: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 60px; padding: 16px 24px; display: none; align-items: center; 
            justify-content: space-between; gap: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: var(--transition); flex-shrink: 0; cursor: pointer; 
        }
        
        .player-control-center, .volume-container, .center-meta img { cursor: default; }
        .center-meta { display: flex; align-items: center; gap: 14px; width: 250px; overflow: hidden; flex-shrink: 0; pointer-events: none;}
        .player-cover-mini { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .player-song-details { overflow: hidden; display: flex; flex-direction: column; }
        .player-song-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-song-artist { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        .player-control-center { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 10px; }
        .player-controls { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
        .control-btn { background: none; border: none; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.7; transition: var(--transition); }
        .control-btn:hover { opacity: 1; transform: scale(1.12); }
        .control-btn.active.shuffle-btn { color: var(--accent-color) !important; opacity: 1; filter: drop-shadow(0 2px 6px rgba(250, 35, 59, 0.4)); }

        .play-pause-btn { background-color: #444446 !important; color: #ffffff !important; width: 44px; height: 44px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); opacity: 1 !important; }
        body.light-mode .play-pause-btn { background-color: #515154 !important; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); }
        .play-pause-btn:hover { transform: scale(1.15) !important; background-color: #545456 !important; box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4); }
        body.light-mode .play-pause-btn:hover { background-color: #3a3a3c !important; }

        .repeat-btn-text { background: rgba(255, 255, 255, 0.08) !important; padding: 4px 10px !important; border-radius: 12px !important; font-size: 11px !important; font-weight: 600 !important; }
        body.light-mode .repeat-btn-text { background: rgba(0, 0, 0, 0.05) !important; }

        .timeline-container { width: 100%; display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .progress-bar-bg { flex: 1; height: 6px; background-color: rgba(255, 255, 255, 0.12); border-radius: 3px; position: relative; cursor: pointer; transition: height 0.2s ease; }
        .progress-bar-bg:hover { height: 8px; }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--accent-color); border-radius: 3px; position: absolute; top: 0; left: 0; pointer-events: none; }
        .progress-bar-bg::after { content: ''; position: absolute; top: 50%; left: var(--progress-percent, 0%); width: 12px; height: 12px; background-color: #ffffff; border-radius: 50%; transform: translate(-50%, -50%) scale(0); box-shadow: 0 2px 6px rgba(0,0,0,0.4); transition: transform 0.15s ease; pointer-events: none; z-index: 2; }
        .progress-bar-bg:hover::after { transform: translate(-50%, -50%) scale(1); }

        .volume-container { position: relative; display: flex; align-items: center; justify-content: flex-end; width: 250px; }
        .volume-btn { background: none; border: none; color: #ffffff; cursor: pointer; opacity: 0.7; transition: var(--transition); margin-right: 10px; }
        .volume-btn:hover { opacity: 1; transform: scale(1.08); }
        .volume-slider { -webkit-appearance: none; appearance: none; width: 100px; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        body.light-mode .volume-slider { background: rgba(0, 0, 0, 0.15); }
        body.light-mode .volume-slider::-webkit-slider-thumb { background: var(--accent-color); }

        /* MODAIS */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.75); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-content { background-color: #1e1e1e; padding: 30px; border-radius: 16px; max-width: 500px; width: 100%; border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .version-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .version-card { background-color: #2c2c2e; padding: 12px; border-radius: 12px; cursor: pointer; text-align: center; transition: var(--transition); border: 1px solid transparent; }
        .version-card:hover { background-color: #3a3a3c; border-color: var(--accent-color); transform: scale(1.02); }
        .version-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .version-card span { font-size: 13px; font-weight: 600; display: block; color: #fff; }

        .settings-bar { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; align-items: center; gap: 15px; background: rgba(35, 35, 35, 0.9); padding: 6px 14px; border-radius: 30px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body.light-mode .settings-bar { background: rgba(240, 240, 240, 0.9); border: 1px solid rgba(0, 0, 0, 0.08); }
        .bg-style-selector { background: none; border: none; color: var(--text-main); font-size: 12px; font-weight: 600; outline: none; cursor: pointer; }
        .bg-style-selector option { background: var(--card-bg); color: var(--text-main); }
        .switch-container { display: flex; align-items: center; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* PLAYER TELA CHEIA MOBILE */
        .expanded-player-mobile {
            position: fixed; top: 100%; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(40px) brightness(0.6); -webkit-backdrop-filter: blur(40px) brightness(0.6);
            z-index: 999999; display: flex; flex-direction: column;
            padding: 40px 30px; transition: top 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            color: white;
        }
        .expanded-player-mobile.active { top: 0; }
        
        .exp-header { display: flex; justify-content: center; align-items: center; margin-bottom: 40px; position: relative; }
        .exp-drag-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; cursor: pointer; }
        
        .exp-art-container { width: 100%; aspect-ratio: 1/1; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; margin-bottom: 40px; }
        .exp-art-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .exp-info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .exp-text { display: flex; flex-direction: column; overflow: hidden; padding-right: 15px; }
        .exp-title { font-size: 24px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .exp-artist { font-size: 16px; color: rgba(255,255,255,0.7); }
        
        .exp-timeline { width: 100%; margin-bottom: 30px; }
        .exp-progress-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; position: relative; margin-bottom: 10px; cursor: pointer; }
        .exp-progress-fill { height: 100%; width: 0%; background: #fff; border-radius: 3px; pointer-events: none; }
        .exp-progress-bg::after { content: ''; position: absolute; top: 50%; left: var(--exp-progress, 0%); width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .exp-time-row { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; }

        .exp-controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .exp-btn { background: none; border: none; color: white; opacity: 0.8; padding: 10px; }
        .exp-btn:active { opacity: 0.5; }
        .exp-play-btn { width: 65px; height: 65px; background: white; color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; opacity: 1; }
        .exp-play-btn:active { transform: scale(0.95); }

        /* RESPONSIVIDADE E DISPOSITIVOS MÓVEIS */
        @media (max-width: 820px) {
            .dashboard-section { padding: 20px 15px 180px 15px; overflow-y: auto; }
            .carousel-container { height: 50vh; }
            .carousel-nav { display: none; } /* Oculta setas no mobile (swipe ativado) */
            .album-card { width: 220px; } /* Cards menores no celular */

            .top-nav-bar { padding: 15px 15px 5px 15px; display: flex; justify-content: flex-start; background-color: transparent; }
            
            .detail-split-container { display: flex; flex-direction: column; overflow-y: auto; padding: 10px 15px 220px 15px; gap: 20px; }
            
            .left-album-block { width: 100%; text-align: center; align-items: center; }
            .album-media-container { width: 100%; max-width: 280px; aspect-ratio: 1 / 1; padding-top: 0; margin: 0 auto 10px auto; }
            
            .album-header-top { align-items: center; text-align: center; border: none; padding-bottom: 0; margin-bottom: 10px; }
            .album-title-header { font-size: 22px; }
            
            .album-header-body { flex-direction: column; overflow: visible; gap: 15px; }
            .album-info-side { align-items: center; text-align: center; min-width: auto; }
            
            .right-content-block { overflow: visible; }
            .right-tracklist-block { overflow-y: visible; padding-right: 0; margin-bottom: 0; }
            
            body.bg-art-active .right-tracklist-block { padding: 12px; backdrop-filter: blur(2px); }

            .floating-player-wrapper {

    <audio id="audioElement" preload="auto"></audio>

    <script>
        const albums = [

                versions: [

                        ]
                    },
                    {
                        versionName: "Oops!... I Did It Again (25th Anniversary)", cover: "oops 25.jpeg", video: "oops 25.mp4", year: "2025", genre: "Pop",
                        tracks: [
                            { num: "1", title: "Oops!... I Did It Again", file: "01 - Britney Spears - Oops!...I Did It Again.mp3" },
                            { num: "2", title: "Stronger", file: "02 - Britney Spears - Stronger.mp3" },
                            { num: "3", title: "Don't Go Knockin' on My Door", file: "03 - Britney Spears - Don't Go Knockin' On My Door.mp3" },
                            { num: "4", title: "(I Can't Get No) Satisfaction", file: "04 - Britney Spears - (I Can't Get No) Satisfaction.mp3" },
                            { num: "16", title: "Walk On By (Bonus)", file: "15 - Britney Spears - Heart.mp3" }
                        ]   
                    }
                ]
            },
            {
                id: "britney", folder: "03 Britney", title: "Britney", artist: "Britney Spears", year: "2001", genre: "Pop", cover: "capa.jpg", video: "video.mp4", 
                tracks: [
                    { num: "1", title: "I'm A Slave 4 U", file: "01 - Britney Spears - I'm A Slave 4 U.mp3" },
                    { num: "2", title: "Overprotected", file: "02 - Britney Spears - Overprotected.mp3" },
                    { num: "3", title: "Lonely", file: "03 - Britney Spears - Lonely.mp3" },
                    { num: "4", title: "I'm Not A Girl, Not Yet A Woman", file: "04 - Britney Spears - I'm Not A Girl, Not Yet A Woman.mp3" },
                    { num: "5", title: "Boys", file: "05 - Britney Spears - Boys.mp3" }
                ]
            },
            {
                id: "in-the-zone", folder: "04 In The Zone", title: "In The Zone", artist: "Britney Spears", year: "2003", genre: "Pop", cover: "capa.jfif", video: "video.mp4", 
                tracks: [
                    { num: "1", title: "Me Against the Music", file: "01 Me Against the Music.m4a" },
                    { num: "2", title: "(I Got That) Boom Boom", file: "02 (I Got That) Boom Boom.m4a" },
                    { num: "3", title: "Showdown", file: "03 Showdown.m4a" },
                    { num: "4", title: "Breathe On Me", file: "04 Breathe On Me.m4a" },
                    { num: "5", title: "Early Mornin'", file: "05 Early Mornin'.m4a" }
                ]
            }			
        ];
	   
        let selectedAlbum = null; let selectedVersion = null;
        let currentTrackIndex = 0; let playingAlbum = null; let playingTracks = []; 
        let currentRepeatMode = 0; let isShuffleActive = false;
        
        /* VARIÁVEIS DO CARROSSEL */
        let currentCarouselIndex = 0;
        let carouselCards = [];

        const audio = document.getElementById('audioElement');
        const playIcon = document.getElementById('playIcon');
        const expPlayIcon = document.getElementById('expPlayIcon');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressBarBg = document.getElementById('progressBarBg');
        const expProgressBarFill = document.getElementById('expProgressBarFill');
        const expProgressBarBg = document.getElementById('expProgressBarBg');

        function initApp() {
            renderDashboard();
            audio.volume = 0.8;
            
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').checked = true;
            }
            const savedBgStyle = localStorage.getItem('bgStyle') || 'default';
            document.getElementById('bgStyleSelector').value = savedBgStyle;
            applyBackgroundStyle(savedBgStyle);

            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => { audio.play(); updatePlayButton(true); });
                navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); updatePlayButton(false); });
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
            
            initSwipeToClose();
        }

        /* ----- LÓGICA DO CARROSSEL 3D ----- */
        function renderDashboard() {
            const track = document.getElementById('albumCarousel');
            track.innerHTML = '';
            
            albums.forEach((album, index) => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.onclick = () => {
                    // Se clicar num álbum que já tá no centro, ele abre. Senão, move para o centro!
                    if (currentCarouselIndex === index) {
                        handleAlbumClick(album);
                    } else {
                        currentCarouselIndex = index;
                        updateCarousel();
                    }
                };
                card.innerHTML = `
                    <div class="album-art-wrapper">
                        <img src="${album.folder}/${album.cover}" alt="${album.title}">
                    </div>
                    <div class="album-card-title">${album.title}</div>
                    <div class="album-card-artist">${album.artist}</div>
                `;
                track.appendChild(card);
            });
            
            carouselCards = document.querySelectorAll('#albumCarousel .album-card');
            updateCarousel();
            initCarouselSwipe();
        }

        function updateCarousel() {
            carouselCards.forEach((card, i) => {
                const offset = i - currentCarouselIndex;
                const sign = Math.sign(offset);
                const absOffset = Math.abs(offset);
                
                // Responsividade dos espaços baseados no tamanho da tela
                const isMobile = window.innerWidth <= 820;
                const space1 = isMobile ? 140 : 220; 
                const space2 = isMobile ? 240 : 380; 

                if (absOffset === 0) {
                    // Centro ativo
                    card.style.transform = `translate(-50%, -50%) scale(1.1) translateX(0px) translateZ(0px)`;
                    card.style.zIndex = 10;
                    card.style.opacity = 1;
                    card.style.pointerEvents = 'auto';
                } else if (absOffset === 1) {
                    // Vizinhos Imediatos (Esquerda/Direita)
                    card.style.transform = `translate(-50%, -50%) scale(0.8) translateX(${sign * space1}px) translateZ(-100px)`;
                    card.style.zIndex = 5;
                    card.style.opacity = 0.6;
                    card.style.pointerEvents = 'auto';
                } else if (absOffset === 2) {
                    // Vizinhos distantes
                    card.style.transform = `translate(-50%, -50%) scale(0.6) translateX(${sign * space2}px) translateZ(-200px)`;
                    card.style.zIndex = 3;
                    card.style.opacity = 0.2;
                    card.style.pointerEvents = 'none';
                } else {
                    // Escondidos
                    card.style.transform = `translate(-50%, -50%) scale(0.4) translateX(${sign * (space2 + 100)}px) translateZ(-300px)`;
                    card.style.zIndex = 1;
                    card.style.opacity = 0;
                    card.style.pointerEvents = 'none';
                }
            });

            // Atualiza Fundo Dinâmico na Home também!
            if (document.body.classList.contains('bg-art-active')) {
                const centerAlbum = albums[currentCarouselIndex];
                document.getElementById('dynamicBlurBg').style.backgroundImage = `url('${centerAlbum.folder}/fundo.png')`;
            }
        }

        function nextCarousel() {
            if (currentCarouselIndex < carouselCards.length - 1) {
                currentCarouselIndex++;
                updateCarousel();
            }
        }

        function prevCarousel() {
            if (currentCarouselIndex > 0) {
                currentCarouselIndex--;
                updateCarousel();
            }
        }

        function initCarouselSwipe() {
            const track = document.getElementById('carouselContainer');
            let startX = 0;
            let endX = 0;

            track.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
            }, {passive: true});

            track.addEventListener('touchend', e => {
                endX = e.changedTouches[0].clientX;
                const threshold = 40;
                if (startX - endX > threshold) {
                    nextCarousel(); // Swipe Esquerda
                } else if (endX - startX > threshold) {
                    prevCarousel(); // Swipe Direita
                }
            }, {passive: true});
        }
        /* ----- FIM LÓGICA DO CARROSSEL ----- */

        function handleAlbumClick(album) { album.hasVersions ? openVersionModal(album) : openAlbum(album, null); }

        function openVersionModal(album) {
            document.getElementById('versionModalTitle').innerText = album.title;
            const grid = document.getElementById('versionGrid');
            grid.innerHTML = '';
            album.versions.forEach(ver => {
                const item = document.createElement('div');
                item.className = 'version-card';
                item.onclick = () => { closeVersionModal(); openAlbum(album, ver); };
                item.innerHTML = `<img src="${album.folder}/${ver.cover}" alt="${ver.versionName}"><span>${ver.versionName}</span>`;
                grid.appendChild(item);
            });
            document.getElementById('versionModal').style.display = 'flex';
        }

        function closeVersionModal() { document.getElementById('versionModal').style.display = 'none'; }

        function openAlbum(album, version) {
            selectedAlbum = album; selectedVersion = version;
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('albumDetailSection').style.display = 'flex';

            document.getElementById('albumTitle').innerText = version ? version.versionName : album.title;
            document.getElementById('albumArtist').innerText = album.artist;
            document.querySelector('.album-meta').innerText = `${version ? version.genre : album.genre} • ${version ? version.year : album.year}`;

            const videoFile = (version && version.video) ? version.video : (album.video || null);
            const artEl = document.getElementById('albumArt');
            const videoEl = document.getElementById('albumVideo');

            if (videoFile && videoFile !== "") {
                artEl.style.display = 'none'; videoEl.style.display = 'block';
                videoEl.src = `${album.folder}/${videoFile}`; videoEl.play().catch(()=>{});
            } else {
                videoEl.style.display = 'none'; videoEl.pause(); videoEl.src = "";
                artEl.src = `${album.folder}/${version ? version.cover : album.cover}`; artEl.style.display = 'block';
            }
            updateDynamicBackground(); renderTracklist();
        }

        function renderTracklist() {
            const tracklistEl = document.getElementById('tracklist');
            tracklistEl.innerHTML = '';
            const tracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : selectedAlbum.tracks;

            tracks.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = 'track-row'; row.id = `track-${index}`;
                row.onclick = () => { playingTracks = tracks; playTrack(index); };
                row.innerHTML = `<div class="equalizer"><div class="eq-bar eq-bar-1"></div><div class="eq-bar eq-bar-2"></div><div class="eq-bar eq-bar-3"></div></div><div class="track-number">${track.num}</div><div class="track-title">${track.title}</div>`;
                tracklistEl.appendChild(row);
            });
            updateTracklistVisuals();
        }

        function showDashboard() {
            document.getElementById('albumVideo').pause();
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('albumDetailSection').style.display = 'none';
            // Restaura o background para o album focado no carrossel
            updateCarousel(); 
        }

        function playTrack(index) {
            currentTrackIndex = index; playingAlbum = selectedAlbum;
            if(playingTracks.length === 0) playingTracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : playingAlbum.tracks;
            
            const track = playingTracks[index];
            document.getElementById('mainFloatingPlayer').style.display = 'flex';
            
            const coverPath = `${playingAlbum.folder}/${selectedVersion ? selectedVersion.cover : playingAlbum.cover}`;
            document.getElementById('miniPlayerArt').src = coverPath;
            document.getElementById('miniPlayerTitle').innerText = track.title;
            document.getElementById('miniPlayerArtist').innerText = playingAlbum.artist;
            
            document.getElementById('expArt').src = coverPath;
            document.getElementById('expTitle').innerText = track.title;
            document.getElementById('expArtist').innerText = playingAlbum.artist;

            if ('mediaSession' in navigator) {
                const absoluteCoverUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1) + coverPath;
                navigator.mediaSession.metadata = new MediaMetadata({ title: track.title, artist: playingAlbum.artist, album: playingAlbum.title, artwork: [{ src: absoluteCoverUrl, sizes: '512x512', type: 'image/jpeg' }] });
            }

            audio.src = `${playingAlbum.folder}/${track.file}`; 
            audio.play().catch(()=>{});
            
            updatePlayButton(true); updateTracklistVisuals();
        }

        function playAlbumFromStart() {
            if (selectedAlbum) {
                playingTracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : selectedAlbum.tracks;
                playTrack(0);
            }
        }

        function togglePlay() {
            if (!audio.src) { if(albums.length > 0) handleAlbumClick(albums[0]); return; }
            if (audio.paused) { audio.play(); updatePlayButton(true); } 
            else { audio.pause(); updatePlayButton(false); }
            updateTracklistVisuals();
        }

        function updatePlayButton(isPlaying) {
            const playSvg = `<path d="M8 5v14l11-7z"/>`;
            const pauseSvg = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            playIcon.innerHTML = isPlaying ? pauseSvg : playSvg;
            expPlayIcon.innerHTML = isPlaying ? pauseSvg : playSvg;
        }

        function updateTracklistVisuals() {
            document.querySelectorAll('.track-row').forEach(row => row.classList.remove('playing'));
            if (playingAlbum && selectedAlbum && playingAlbum.id === selectedAlbum.id && !audio.paused) {
                const activeRow = document.getElementById(`track-${currentTrackIndex}`);
                if (activeRow) activeRow.classList.add('playing');
            }
        }

        function nextTrack() {
            if (playingTracks.length === 0) return;
            if (currentRepeatMode === 1) { playTrack(currentTrackIndex); return; }
            if (isShuffleActive) { playTrack(Math.floor(Math.random() * playingTracks.length)); return; }
            
            if (currentTrackIndex < playingTracks.length - 1) playTrack(currentTrackIndex + 1);
            else audio.pause();
        }

        function prevTrack() {
            if (playingTracks.length === 0) return;
            currentTrackIndex = currentTrackIndex - 1 < 0 ? playingTracks.length - 1 : currentTrackIndex - 1;
            playTrack(currentTrackIndex);
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            const formatTime = (seconds) => `${Math.floor(seconds / 60)}:${Math.floor(seconds % 60).toString().padStart(2, '0')}`;
            
            progressBarFill.style.width = `${percent}%`;
            progressBarBg.style.setProperty('--progress-percent', `${percent}%`);
            document.getElementById('timeCurrent').innerText = formatTime(audio.currentTime);
            document.getElementById('timeRemaining').innerText = "-" + formatTime(audio.duration - audio.currentTime);
            
            expProgressBarFill.style.width = `${percent}%`;
            expProgressBarBg.style.setProperty('--exp-progress', `${percent}%`);
            document.getElementById('expTimeCurrent').innerText = formatTime(audio.currentTime);
            document.getElementById('expTimeRemaining').innerText = "-" + formatTime(audio.duration - audio.currentTime);
        });

        function seekAudio(event) {
            if (!audio.duration) return;
            audio.currentTime = ((event.clientX - progressBarBg.getBoundingClientRect().left) / progressBarBg.getBoundingClientRect().width) * audio.duration;
        }
        
        function seekAudioExp(event) {
            if (!audio.duration) return;
            audio.currentTime = ((event.clientX - expProgressBarBg.getBoundingClientRect().left) / expProgressBarBg.getBoundingClientRect().width) * audio.duration;
        }

        function setVolume(value) { audio.volume = value; }
        audio.addEventListener('ended', nextTrack);

        const expPlayer = document.getElementById('expandedPlayerMobile');
        
        function openExpandedPlayer() {
            if (window.innerWidth <= 820) {
                expPlayer.classList.add('active');
                document.body.style.overflow = 'hidden'; 
            }
        }
        
        function closeExpandedPlayer() {
            expPlayer.classList.remove('active');
            document.body.style.overflow = '';
        }

        function initSwipeToClose() {
            let touchStartY = 0;
            expPlayer.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: true});
            expPlayer.addEventListener('touchmove', e => {
                const currentY = e.touches[0].clientY;
                if (currentY > touchStartY && (currentY - touchStartY) > 50) {
                    if(e.target.tagName !== "INPUT") closeExpandedPlayer();
                }
            }, {passive: true});
        }
        
        function toggleShuffle() { isShuffleActive = !isShuffleActive; document.getElementById('shuffleBtn').classList.toggle('active'); }
        function toggleRepeatMode() {
            currentRepeatMode = (currentRepeatMode + 1) % 4;
            const btn = document.getElementById('repeatText');
            if (currentRepeatMode === 0) btn.innerText = "Off"; else if (currentRepeatMode === 1) btn.innerText = "Música"; else if (currentRepeatMode === 2) btn.innerText = "Álbum"; else btn.innerText = "Disco";
        }
        function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); }
        
        function changeBackgroundStyle() { 
            localStorage.setItem('bgStyle', document.getElementById('bgStyleSelector').value); 
            applyBackgroundStyle(document.getElementById('bgStyleSelector').value); 
        }
        
        function applyBackgroundStyle(style) {
            if (style === 'art') { 
                document.body.classList.add('bg-art-active'); 
                document.documentElement.style.setProperty('--blur-overlay-opacity', '1'); 
                updateDynamicBackground(); 
            } else { 
                document.body.classList.remove('bg-art-active'); 
                document.documentElement.style.setProperty('--blur-overlay-opacity', '0'); 
                document.getElementById('dynamicBlurBg').style.backgroundImage = 'none'; 
            }
        }
        
        function updateDynamicBackground() {
            if (!document.body.classList.contains('bg-art-active')) return;
            
            // Verifica se está na tela de detalhes (selectedAlbum) ou no dashboard (carrossel ativo)
            if (document.getElementById('albumDetailSection').style.display === 'flex' && selectedAlbum) {
                document.getElementById('dynamicBlurBg').style.backgroundImage = `url('${selectedAlbum.folder}/fundo.png')`;
            } else {
                const centerAlbum = albums[currentCarouselIndex];
                if(centerAlbum) {
                    document.getElementById('dynamicBlurBg').style.backgroundImage = `url('${centerAlbum.folder}/fundo.png')`;
                }
            }
        }

        initApp();
    </script>
</body>
</html>
