<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discografia Britney Spears</title>
	
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --accent-color: #fa233b; 
            --border-radius: 12px;
            --player-bg: rgba(24, 24, 24, 0.75); 
            --glass-bg: rgba(22, 22, 22, 0.5);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --blur-overlay-opacity: 0; 
        }

        /* AJUSTES PARA MODO CLARO */
        body.light-mode { 
            --bg-color: #f5f5f7; 
            --text-main: #1d1d1f; 
            --card-bg: #ffffff;
            --text-muted: #86868b;
            --player-bg: rgba(255, 255, 255, 0.85); 
        }
        body.light-mode .album-card { border: 1px solid #e5e5e7; }
        body.light-mode .album-card-title { color: #1d1d1f; }
        body.light-mode .album-card-artist { color: #86868b; }
        body.light-mode .top-nav-bar { background-color: transparent; }
        body.light-mode .modal-content { background-color: #ffffff; color: #1d1d1f; border: 1px solid #e5e5e7; }
        body.light-mode .modal-text { color: #515154; }
        body.light-mode .modal-close { color: #1d1d1f; }
        body.light-mode .track-row { border-bottom: 1px solid rgba(0,0,0,0.05); }
        body.light-mode .track-row:hover { background-color: rgba(0,0,0,0.03); }
        body.light-mode .floating-player-wrapper { border: 1px solid rgba(0, 0, 0, 0.08); color: #1d1d1f; }
        body.light-mode .control-btn, body.light-mode .volume-btn { color: #1d1d1f; }
        body.light-mode .control-btn:not(.active):not(.play-pause-btn) { color: #515154; }
        body.light-mode .repeat-btn-text, body.light-mode .shuffle-btn { color: #1d1d1f !important; }
        body.light-mode .timeline-container { color: #86868b; }
        body.light-mode .progress-bar-bg { background-color: rgba(0, 0, 0, 0.1); }
        body.light-mode .progress-bar-fill { background-color: var(--accent-color); }
        
        body.light-mode .version-card { background-color: #eaeaea; }
        body.light-mode .version-card span { color: #1d1d1f; }
        body.light-mode .version-card:hover { background-color: #dddddd; }

        /* AJUSTES DE CONTRASTE NO MODO ARTE DO ÁLBUM */
        body.bg-art-active {
            --text-muted: #e1e1e6;
        }
        body.bg-art-active.light-mode {
            --text-muted: #2c2c2e;
        }
        body.bg-art-active .album-meta {
            color: var(--text-main) !important;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }
        body.bg-art-active .track-number {
            color: var(--text-main) !important;
            font-weight: bold;
        }

        /* BACKDROP */
        .dynamic-blur-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            filter: blur(25px) brightness(0.4) saturate(1.2); 
            transform: scale(1.1); 
            z-index: -2;
            opacity: var(--blur-overlay-opacity);
            transition: opacity 0.8s ease, background-image 0.8s ease;
        }
        body.light-mode .dynamic-blur-bg {
            filter: blur(25px) brightness(0.85) saturate(1.2);
        }

        .dynamic-blur-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(18, 18, 18, 0.2); 
            z-index: -1;
            opacity: var(--blur-overlay-opacity);
            transition: opacity 0.8s ease;
        }
        body.light-mode .dynamic-blur-overlay {
            background: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* SEÇÃO 1: DASHBOARD */
        .dashboard-section {
            display: block;
            padding: 40px;
            overflow-y: auto;
            height: 100%;
            padding-bottom: 160px;
        }

        .section-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .album-card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .album-card:hover {
            transform: translateY(-5px);
            background-color: #2d2d2d;
            border-color: #3a3a3c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        body.light-mode .album-card:hover {
            background-color: #f0f0f2;
            border-color: #ccc;
        }

        /* AJUSTE: Vidro muito mais sutil nos cards para ver melhor o fundo */
        body.bg-art-active .album-card {
            background-color: rgba(36, 36, 36, 0.15); 
            backdrop-filter: blur(2px); 
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        body.bg-art-active.light-mode .album-card {
            background-color: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .album-art-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .album-art-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .album-card-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .album-card-artist {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* SEÇÃO 2: DETALHES DO ÁLBUM */
        .album-detail-section {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .top-nav-bar {
            background-color: var(--bg-color);
            padding: 20px 40px 10px 40px;
            flex-shrink: 0;
            transition: background-color 0.3s;
            z-index: 10;
        }
        body.bg-art-active .top-nav-bar {
            background-color: transparent;
        }

        .back-btn {
            background: rgba(35, 35, 35, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px; 
            font-weight: 600;
            cursor: pointer;
            display: inline-flex; 
            align-items: center; 
            gap: 5px;
            transition: var(--transition);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }
        body.light-mode .back-btn {
            background: rgba(240, 240, 240, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
        body.light-mode .back-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .detail-split-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 10px 40px 150px 40px;
            gap: 50px;
        }

        .left-album-block {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .album-media-container {
            width: 100%;
            padding-top: 100%; 
            position: relative;
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            overflow: hidden;
            background-color: #000;
        }

        .album-art, .album-video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; 
            position: absolute;
            top: 0; 
            left: 0;
            display: block;
        }

        .album-video {
            display: none; 
        }

        .album-title-header {
            font-size: 18px; 
            font-weight: 800;
            margin-bottom: 4px; 
            letter-spacing: -0.5px;
        }

        .album-artist-header {
            font-size: 18px; 
            color: var(--accent-color);
            font-weight: 600; 
            margin-bottom: 4px;
        }

        .album-meta {
            font-size: 13px; 
            color: var(--text-muted); 
            margin-bottom: 12px;
            transition: color 0.3s;
        }

        .album-description {
            font-size: 13.5px; 
            color: #cccccc; 
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 4; 
            -webkit-box-orient: vertical;  
            overflow: hidden; 
            margin-bottom: 10px;
        }
        body.light-mode .album-description {
            color: #555555;
        }

        .play-album-btn {
            background-color: var(--accent-color); 
            color: #ffffff; 
            border: none;
            padding: 12px 28px; 
            border-radius: 24px;
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer;
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            width: fit-content; 
            transition: transform 0.2s;
        }

        .play-album-btn:hover { transform: scale(1.02); }

        .right-tracklist-block {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* AJUSTE: Vidro reduzido na lista de faixas para dar maior visibilidade ao fundo */
        body.bg-art-active .right-tracklist-block {
            background: rgba(35, 35, 35, 0.15); 
            backdrop-filter: blur(2px); 
            -webkit-backdrop-filter: blur(2px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        body.bg-art-active.light-mode .right-tracklist-block {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .tracklist {
            display: flex; flex-direction: column; width: 100%;
        }

        .track-row {
            display: flex; align-items: center; padding: 14px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer; border-radius: 6px; transition: background-color 0.2s;
        }

        .track-row:hover { background-color: rgba(255, 255, 255, 0.04); }
        .track-row.playing { background-color: var(--accent-color) !important; color: #ffffff; }

        .track-number { width: 40px; color: var(--text-muted); font-size: 14px; transition: color 0.3s; }
        .track-row.playing .track-number { color: rgba(255, 255, 255, 0.7); }
        .track-title { flex: 1; font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* EQUALIZADOR ANIMADO PARA FAIXA TOCANDO */
        .equalizer {
            display: none;
            align-items: flex-end;
            gap: 2px;
            width: 20px;
            height: 15px;
            margin-right: 20px;
        }
        .track-row.playing .equalizer {
            display: flex;
        }
        .track-row.playing .track-number {
            display: none;
        }
        .eq-bar {
            width: 3px;
            background-color: #ffffff;
            animation: bounce 0.8s ease-in-out infinite alternate;
            border-radius: 1px;
        }
        .eq-bar-1 { height: 30%; animation-delay: 0.1s; }
        .eq-bar-2 { height: 100%; animation-delay: 0.3s; }
        .eq-bar-3 { height: 60%; animation-delay: 0.5s; }

        @keyframes bounce {
            10% { transform: scaleY(0.3); }
            100% { transform: scaleY(1.1); }
        }

        /* PLAYER FLUTUANTE (GLASSMORPHISM) */
        .floating-player-wrapper {
            position: fixed; 
            bottom: 30px; 
            left: 50%;
            transform: translateX(-50%); 
            width: 92%; 
            max-width: 900px;
            background-color: var(--player-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 24px; 
            padding: 16px 24px; 
            display: none; 
            align-items: center; 
            justify-content: space-between;
            gap: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            z-index: 9999; 
            transition: var(--transition);
        }

        /* INFORMAÇÕES DO ÁLBUM (ESQUERDA) */
        .center-meta { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            width: 220px; 
            overflow: hidden; 
            flex-shrink: 0; 
        }
        .player-cover-mini { 
            width: 48px; 
            height: 48px; 
            border-radius: 8px; 
            object-fit: cover; 
            flex-shrink: 0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .player-song-details { overflow: hidden; display: flex; flex-direction: column; }
        .player-song-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-song-artist { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        /* PAINEL DE CONTROLE CENTRALIZADO */
        .player-control-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 10px;
        }

        .player-controls { 
            display: flex; 
            align-items: center; 
            gap: 18px; 
            flex-shrink: 0; 
        }

        .control-btn { 
            background: none; 
            border: none; 
            color: #ffffff; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            opacity: 0.7; 
            transition: var(--transition); 
        }
        .control-btn:hover { 
            opacity: 1; 
            transform: scale(1.12);
        }

        /* ALEATÓRIO ATIVO: FICA VERMELHO */
        .control-btn.active.shuffle-btn { 
            color: var(--accent-color) !important; 
            opacity: 1;
            filter: drop-shadow(0 2px 6px rgba(250, 35, 59, 0.4));
        }

        /* BOTÃO DE PLAY/PAUSE - AJUSTADO PARA CORREÇÃO DE CONTRASTE NO CLARO/ESCURO */
        .play-pause-btn {
            background-color: #444446 !important; /* Cinza médio no modo escuro */
            color: #ffffff !important;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            opacity: 1 !important;
        }
        /* AJUSTE ESSENCIAL: Escurecido o play/pause no tema claro para não sumir */
        body.light-mode .play-pause-btn {
            background-color: #515154 !important; /* Cinza escuro para excelente contraste */
            color: #ffffff !important; /* Ícone permanece nítido em branco */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        .play-pause-btn:hover {
            transform: scale(1.15) !important;
            background-color: #545456 !important;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
        }
        body.light-mode .play-pause-btn:hover {
            background-color: #3a3a3c !important; /* Hover ainda mais contrastante no claro */
        }
        .play-pause-btn svg {
            fill: currentColor !important;
        }

        /* REPETIDOR COM DESIGN APPLE MUSIC-LIKE */
        .repeat-btn-text {
            background: rgba(255, 255, 255, 0.08) !important;
            padding: 4px 10px !important;
            border-radius: 12px !important;
            font-size: 11px !important;
            font-weight: 600 !important;
            letter-spacing: 0.3px;
        }
        body.light-mode .repeat-btn-text {
            background: rgba(0, 0, 0, 0.05) !important;
        }

        /* TIMELINE CONTROLLER */
        .timeline-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s ease;
        }
        .progress-bar-bg:hover { 
            height: 8px; 
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            border-radius: 3px;
            position: absolute;
            top: 0; left: 0;
            transition: width 0.1s linear;
        }
        
        /* Indicador do progresso (thumb) */
        .progress-bar-bg::after {
            content: '';
            position: absolute;
            top: 50%;
            left: var(--progress-percent, 0%);
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.15s ease;
            pointer-events: none;
            z-index: 2;
        }
        .progress-bar-bg:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        /* VOLUME */
        .volume-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }
        .volume-btn {
            background: none; border: none; color: #ffffff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; opacity: 0.7; transition: var(--transition);
        }
        .volume-btn:hover { 
            opacity: 1; 
            transform: scale(1.08);
        }

        .volume-popover {
            position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
            background-color: rgba(28, 28, 30, 0.95); border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 16px 12px; border-radius: 20px; display: none;
            flex-direction: column; align-items: center; height: 150px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); z-index: 110;
        }
        body.light-mode .volume-popover { background-color: rgba(255, 255, 255, 0.95); border: 1px solid rgba(0, 0, 0, 0.08); }
        .volume-popover.active { display: flex; }

        .volume-slider-vertical {
            -webkit-appearance: none; appearance: none; width: 4px; height: 100px;
            background: rgba(255, 255, 255, 0.2); border-radius: 2px; outline: none;
            writing-mode: vertical-lr; direction: rtl; cursor: pointer;
        }
        body.light-mode .volume-slider-vertical { background: rgba(0, 0, 0, 0.15); }
        .volume-slider-vertical::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 12px; height: 12px;
            border-radius: 50%; background: #ffffff; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        body.light-mode .volume-slider-vertical::-webkit-slider-thumb { background: var(--accent-color); }

        /* MODAIS */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px;
        }
        .modal-content { background-color: #1e1e1e; padding: 30px; border-radius: 16px; max-width: 500px; width: 100%; border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .modal-text { font-size: 14px; line-height: 1.6; color: #eee; margin-top: 10px; }

        .version-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .version-card {
            background-color: #2c2c2e;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .version-card:hover {
            background-color: #3a3a3c;
            border-color: var(--accent-color);
            transform: scale(1.02);
        }
        .version-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .version-card span {
            font-size: 13px;
            font-weight: 600;
            display: block;
            color: #fff;
        }

        .dashboard-section::-webkit-scrollbar, .right-tracklist-block::-webkit-scrollbar { width: 6px; }
        .dashboard-section::-webkit-scrollbar-thumb, .right-tracklist-block::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* CONFIGURAÇÕES DO PAINEL DE CONTROLE FIXO */
        .settings-bar { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 99999; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: rgba(35, 35, 35, 0.9); 
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        body.light-mode .settings-bar {
            background: rgba(240, 240, 240, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .bg-style-selector {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 12px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        .bg-style-selector option {
            background: var(--card-bg);
            color: var(--text-main);
        }

        .switch-container { display: flex; align-items: center; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* RESPONSIVIDADE E DISPOSITIVOS MÓVEIS */
        @media (max-width: 820px) {
            .dashboard-section { padding: 20px 15px 180px 15px; }
            .album-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }

            .top-nav-bar {

                flex-direction: column; 
                overflow-y: auto; 
                padding: 10px 15px 220px 15px; 
                gap: 20px; 
            }
            .left-album-block { width: 100%; text-align: center; align-items: center; }
            
            .album-media-container { 
                width: 100%; 
                max-width: 240px; 
                aspect-ratio: 1 / 1; 
                padding-top: 0; 
                margin: 0 auto 10px auto; 
            }
            
            .album-description { display: none; }
            .right-tracklist-block { overflow-y: visible; }
            
            body.bg-art-active .right-tracklist-block {
                padding: 12px;
                backdrop-filter: blur(2px); 
            }

            /* RECONSTRUÇÃO COMPACTA DO PLAYER NO MOBILE */
            .floating-player-wrapper { 
                display: none; 
                flex-direction: column;
                gap: 12px;
                bottom: 15px; 
                width: 92%; 
                padding: 14px 16px;
                border-radius: 20px;

            .player-upper-row {

            else if (currentRepeatMode === 1) btn.innerText = "Música";

                document.getElementById('themeToggle').checked = true;

            const savedBgStyle = localStorage.getItem('bgStyle') || 'default';
            document.getElementById('bgStyleSelector').value = savedBgStyle;
            applyBackgroundStyle(savedBgStyle);

            document.addEventListener('click', (e) => {
                const container = document.getElementById('volumeContainer');

                if (container && !container.contains(e.target)) {
                    popover.classList.remove('active');

        function renderDashboard() {
            const grid = document.getElementById('albumGrid');
            grid.innerHTML = '';
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.onclick = () => handleAlbumClick(album);
                card.innerHTML = `
                    <div class="album-art-wrapper">
                        <img src="${album.folder}/${album.cover}" alt="${album.title}">
                    </div>
                    <div class="album-card-title">${album.title}</div>
                    <div class="album-card-artist">${album.artist}</div>
                `;
                grid.appendChild(card);
            });
        }

        function handleAlbumClick(album) {
            if (album.hasVersions) {
                openVersionModal(album);
            } else {
                openAlbum(album, null);
            }
        }

        function openVersionModal(album) {
            const modal = document.getElementById('versionModal');
            const grid = document.getElementById('versionGrid');
            document.getElementById('versionModalTitle').innerText = album.title;
            grid.innerHTML = '';

            album.versions.forEach(ver => {
                const item = document.createElement('div');
                item.className = 'version-card';
                item.onclick = () => {
                    closeVersionModal();
                    openAlbum(album, ver);
                };
                item.innerHTML = `
                    <img src="${album.folder}/${ver.cover}" alt="${ver.versionName}">
                    <span>${ver.versionName}</span>
                `;
                grid.appendChild(item);
            });
            modal.style.display = 'flex';
        }

        function closeVersionModal() {
            document.getElementById('versionModal').style.display = 'none';
        }

        function openAlbum(album, version) {
            selectedAlbum = album;
            selectedVersion = version;

            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('albumDetailSection').style.display = 'flex';

            const title = version ? version.versionName : album.title;
            const coverFile = version ? version.cover : album.cover;
            const videoFile = (version && version.video) ? version.video : (album.video || null);
            const year = version ? version.year : album.year;
            const genre = version ? version.genre : album.genre;
            const description = version ? version.description : album.description;

            document.getElementById('albumTitle').innerText = title;
            document.getElementById('albumArtist').innerText = album.artist;
            document.querySelector('.album-meta').innerText = `${genre} • ${year}`;
            document.querySelector('.album-description').innerText = description;
            document.querySelector('.modal-text').innerText = description;

            const artEl = document.getElementById('albumArt');
            const videoEl = document.getElementById('albumVideo');

            if (videoFile && videoFile !== "") {
                artEl.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.src = `${album.folder}/${videoFile}`;
                videoEl.play().catch(err => console.log("Vídeo não carregado:", err));
            } else {
                videoEl.style.display = 'none';
                videoEl.pause();
                videoEl.src = "";
                artEl.src = `${album.folder}/${coverFile}`;
                artEl.style.display = 'block';
            }

            updateDynamicBackground();
            renderTracklist();
        }

        function renderTracklist() {

            tracks.forEach((track, index) => {

                    <div class="equalizer">
                        <div class="eq-bar eq-bar-1"></div>
                        <div class="eq-bar eq-bar-2"></div>
                        <div class="eq-bar eq-bar-3"></div>
                    </div>
                    <div class="track-number">${track.num}</div>
                    <div class="track-title">${track.title}</div>
                `;
                tracklistEl.appendChild(row);
            });
            updateTracklistVisuals();
        }

        function showDashboard() {
            selectedAlbum = null;
            selectedVersion = null;
            const videoEl = document.getElementById('albumVideo');
            videoEl.pause();
            videoEl.src = "";

            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('albumDetailSection').style.display = 'none';

            updateDynamicBackground();
        }

        function playTrack(index) {
            currentTrackIndex = index;
            playingAlbum = selectedAlbum;
            
            if(playingTracks.length === 0) {
                playingTracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : playingAlbum.tracks;
            }
            const track = playingTracks[index];

            const player = document.getElementById('mainFloatingPlayer');
            player.style.display = 'flex';
            document.body.classList.add('player-active'); 
            
            const activeCover = selectedVersion ? selectedVersion.cover : playingAlbum.cover;
            document.getElementById('miniPlayerArt').src = `${playingAlbum.folder}/${activeCover}`;
            document.getElementById('miniPlayerTitle').innerText = track.title;
            document.getElementById('miniPlayerArtist').innerText = playingAlbum.artist;

            audio.src = `${playingAlbum.folder}/${track.file}`; 
            audio.load(); 
            audio.play().catch(err => console.log("Erro ao reproduzir áudio:", err));

            preLoadNextTrack();
            updatePlayButton(true);
            updateTracklistVisuals();
        }

        function preLoadNextTrack() {
            if (currentTrackIndex < playingTracks.length - 1) {
                const nextTrack = playingTracks[currentTrackIndex + 1];
                const tempAudio = new Audio();
                tempAudio.src = `${playingAlbum.folder}/${nextTrack.file}`;
                tempAudio.preload = "auto";
            }
        }

        function playAlbumFromStart() {
            if (selectedAlbum) {
                playingTracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : selectedAlbum.tracks;
                playTrack(0);
            }
        }

        function togglePlay() {
            if (!audio.src) {
                if(albums.length > 0) {
                    handleAlbumClick(albums[0]);
                }
                return;
            }
            if (audio.paused) {
                audio.play().catch(err => console.log(err));
                updatePlayButton(true);
            } else {
                audio.pause();
                updatePlayButton(false);
            }
            updateTracklistVisuals();
        }

        function updatePlayButton(isPlaying) {
            if (isPlaying) {
                playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            } else {
                playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            }
        }

        function updateTracklistVisuals() {
            document.querySelectorAll('.track-row').forEach(row => row.classList.remove('playing'));
            if (playingAlbum && selectedAlbum && playingAlbum.id === selectedAlbum.id) {
                const activeRow = document.getElementById(`track-${currentTrackIndex}`);
                if (activeRow && !audio.paused) {
                    activeRow.classList.add('playing');
                }
            }
        }

        function nextTrack() {
            if (!playingAlbum || playingTracks.length === 0) return;

            if (currentRepeatMode === 1) {
                playTrack(currentTrackIndex);
                return;
            }

            if (isShuffleActive) {
                const randomIndex = Math.floor(Math.random() * playingTracks.length);
                playTrack(randomIndex);
                return;
            }
            
            if (currentTrackIndex < playingTracks.length - 1) {
                playTrack(currentTrackIndex + 1);
            } else {
                if (currentRepeatMode === 2) {
                    playTrack(0);
                } 
                else if (currentRepeatMode === 3) {
                    const albumIndex = albums.findIndex(a => a.id === playingAlbum.id);
                    if (albumIndex < albums.length - 1) {
                        const nextAlbum = albums[albumIndex + 1];
                        
                        let targetVersion = null;
                        if (nextAlbum.hasVersions) {
                            targetVersion = nextAlbum.versions.reduce((prev, current) => {
                                return (prev.tracks.length > current.tracks.length) ? prev : current;
                            });
                        }

                        openAlbum(nextAlbum, targetVersion);
                        playingTracks = targetVersion ? targetVersion.tracks : nextAlbum.tracks;
                        playTrack(0);
                    } else {
                        const firstAlbum = albums[0];
                        let firstVersion = null;
                        if (firstAlbum.hasVersions) {
                            firstVersion = firstAlbum.versions.reduce((prev, current) => {
                                return (prev.tracks.length > current.tracks.length) ? prev : current;
                            });
                        }
                        openAlbum(firstAlbum, firstVersion);
                        playingTracks = firstVersion ? firstVersion.tracks : firstAlbum.tracks;
                        playTrack(0);
                    }
                } else {
                    audio.pause();
                    updatePlayButton(false);
                    document.body.classList.remove('player-active');
                    updateTracklistVisuals();
                }
            }
        }

        function prevTrack() {
            if (!playingAlbum || playingTracks.length === 0) return;
            
            currentTrackIndex--;
            if (currentTrackIndex < 0) {
                currentTrackIndex = playingTracks.length - 1;
            }
            playTrack(currentTrackIndex);
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBarFill.style.width = `${percent}%`;
            progressBarBg.style.setProperty('--progress-percent', `${percent}%`);
            
            timeCurrent.innerText = formatTime(audio.currentTime);
            timeRemaining.innerText = "-" + formatTime(audio.duration - audio.currentTime);
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function seekAudio(event) {
            if (!audio.src || !audio.duration) return;
            const rect = progressBarBg.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            audio.currentTime = (clickX / rect.width) * audio.duration;
        }

        function toggleVolumePopover(event) {
            event.stopPropagation();
            const popover = document.getElementById('volumePopover');
            popover.classList.toggle('active');
        }

        function setVolume(value) { 
            audio.volume = value; 
            const volumeIcon = document.getElementById('volumeIcon');
            
            if (parseFloat(value) === 0) {
                volumeIcon.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
            } else if (parseFloat(value) < 0.5) {
                volumeIcon.innerHTML = `<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>`;
            } else {
                volumeIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
            }
        }

        audio.addEventListener('ended', nextTrack);
        
        function openModal() { document.getElementById('textModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('textModal').style.display = 'none'; }
        
		function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        function changeBackgroundStyle() {
            const selectedStyle = document.getElementById('bgStyleSelector').value;
            localStorage.setItem('bgStyle', selectedStyle);
            applyBackgroundStyle(selectedStyle);
        }

        function applyBackgroundStyle(style) {
            if (style === 'art') {
                document.body.classList.add('bg-art-active');
                document.documentElement.style.setProperty('--blur-overlay-opacity', '1');
                updateDynamicBackground();
            } else {
                document.body.classList.remove('bg-art-active');
                document.documentElement.style.setProperty('--blur-overlay-opacity', '0');
                const blurBg = document.getElementById('dynamicBlurBg');
                blurBg.style.backgroundImage = 'none';
            }
        }

        function updateDynamicBackground() {
            if (!document.body.classList.contains('bg-art-active')) return;

            const blurBg = document.getElementById('dynamicBlurBg');

            if (selectedAlbum) {
                const activeFolder = selectedAlbum.folder;
                const activeBgFile = "fundo.png";
                blurBg.style.backgroundImage = `url('${activeFolder}/${activeBgFile}')`;
            } else {
                blurBg.style.backgroundImage = 'none';
            }
        }
        
        initApp();
    </script>
</body>
</html>
