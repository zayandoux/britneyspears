<!DOCTYPE html>
<html lang="pt-BR">
<head>
<div class="switch-container">
        <label class="switch">
            <input type="checkbox" onclick="toggleTheme()">
            <span class="slider"></span>
        </label>
    </div>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discografia Britney Spears</title>
	
    <style>
	
        :root {
            --bg-color: #161616;
            --card-bg: #242424;
            --text-main: #ffffff;
            --text-muted: #8a8a8e;
            --accent-color: #fa233b; 
            --border-radius: 12px;
            --player-bg: rgba(35, 35, 35, 0.9);
            --glass-bg: rgba(22, 22, 22, 0.7);
            --transition: all 0.3s ease;
        }
		/* Adição para Modo Claro */
        body.light-mode { background-color: #f5f5f5; color: #121212; }
        body.light-mode .album-card { background-color: #ffffff; border: 1px solid #ddd; }
        body.light-mode .album-card-title { color: #121212; }
        body.light-mode .album-card-artist { color: #666666; }
        body.light-mode .top-nav-bar { background-color: #f5f5f5; }
        body.light-mode .modal-content { background-color: #fff; color: #000; border: 1px solid #ccc; }
        body.light-mode .track-row { border-bottom: 1px solid rgba(0,0,0,0.05); }
        body.light-mode .track-row:hover { background-color: rgba(0,0,0,0.05); }
        body.light-mode .floating-player-wrapper { background-color: rgba(240,240,240,0.9); border: 1px solid #ddd; color: #121212; }
        body.light-mode .control-btn, body.light-mode .volume-btn { color: #121212; }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
		
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
			
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* SEÇÃO 1: DASHBOARD (TELA INICIAL) */
        .dashboard-section {
            display: block;
            padding: 40px;
            overflow-y: auto;
            height: 100%;
            padding-bottom: 160px;
        }

        .section-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .album-card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .album-card:hover {
            transform: translateY(-5px);
            background-color: #2d2d2d;
            border-color: #3a3a3c;
        }

        .album-art-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .album-art-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .album-card-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .album-card-artist {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* SEÇÃO 2: DETALHES DO ÁLBUM */
        .album-detail-section {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .top-nav-bar {
            background-color: var(--bg-color);
            padding: 20px 40px 10px 40px;
            flex-shrink: 0;
        }

        .back-btn {
            background: none; border: none;
            color: var(--accent-color);
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 4px;
        }

        .detail-split-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 10px 40px 20px 40px;
            gap: 50px;
        }

        .left-album-block {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

       /* 1. Container que força a proporção quadrada (1:1) perfeita e infalível */
        .album-media-container {
            width: 100%;
            padding-top: 100%; /* Truque clássico: força altura igual à largura */
            position: relative;
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            overflow: hidden;
            background-color: #000;
        }

        /* 2. Força tanto a imagem como o vídeo a cobrir o quadrado sem distorcer */
        .album-art, .album-video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; /* Corta e preenche o quadrado sem esticar */
            position: absolute;
            top: 0; 
            left: 0;
            display: block;
        }

        .album-video {
            display: none; /* Controlado pelo JavaScript */
        }

        .album-title-header {
            font-size: 18px; 
            font-weight: 800;
            margin-bottom: 4px; 
            letter-spacing: -0.5px;
        }

        .album-artist-header {
            font-size: 18px; 
            color: var(--accent-color);
            font-weight: 600; 
            margin-bottom: 4px;
        }

        .album-meta {
            font-size: 13px; 
            color: var(--text-muted); 
            margin-bottom: 12px;
        }

        .album-description {
            font-size: 13.5px; 
            color: #cccccc; 
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 4; 
            -webkit-box-orient: vertical;  
            overflow: hidden; 
            margin-bottom: 10px;
        }

        .more-btn {
            color: #ffffff; font-weight: 700; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
            border: none; background: none; letter-spacing: 0.5px;
            text-align: left; margin-bottom: 15px;
            width: fit-content;
        }

        .play-album-btn {
            background-color: var(--accent-color); 
            color: #ffffff; 
            border: none;
            padding: 12px 28px; 
            border-radius: 24px;
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer;
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            width: fit-content; 
            transition: transform 0.2s;
        }

        .play-album-btn:hover { transform: scale(1.02); }

        .right-tracklist-block {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .tracklist {
            display: flex; flex-direction: column; width: 100%;
        }

        .track-row {
            display: flex; align-items: center; padding: 14px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer; border-radius: 6px; transition: background-color 0.2s;
        }

        .track-row:hover { background-color: rgba(255, 255, 255, 0.04); }
        .track-row.playing { background-color: #8e001c !important; color: #ffffff; }

        .track-number { width: 40px; color: var(--text-muted); font-size: 14px; }
        .track-row.playing .track-number { color: rgba(255, 255, 255, 0.7); }
        .track-title { flex: 1; font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER FLUTUANTE */
        .floating-player-wrapper {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 92%; max-width: 800px;
            background-color: var(--player-bg); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 12px 20px; 
            display: none; 
            align-items: center; gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); z-index: 100;
        }

        .player-controls { display: flex; align-items: center; gap: 14px; }
        .control-btn { background: none; border: none; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.85; transition: opacity 0.2s; }
        .control-btn:hover { opacity: 1; }

        .center-meta { display: flex; align-items: center; gap: 12px; width: 180px; overflow: hidden; flex-shrink: 0; }
        .player-cover-mini { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .player-song-details { overflow: hidden; display: flex; flex-direction: column; }
        .player-song-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-song-artist { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

        /* LINHA DE PROGRESSO */
        .timeline-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            min-width: 150px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        
        .progress-bar-bg:hover { height: 6px; }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            border-radius: 2px;
            position: absolute;
            top: 0; left: 0;
        }
		

        /* CONTROLE DE VOLUME VERTICAL POPOVER */
        .volume-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
        }

        .volume-btn {
            background: none; border: none; color: #ffffff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; opacity: 0.85; transition: opacity 0.2s;
        }

        .volume-btn:hover { opacity: 1; }

        .volume-popover {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background-color: #242424; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 10px; border-radius: 20px; display: none;
            flex-direction: column; align-items: center; height: 140px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 110;
        }

        .volume-popover.active { display: flex; }
		

        .volume-slider-vertical {
            -webkit-appearance: none; appearance: none; width: 4px; height: 100px;
            background: rgba(255, 255, 255, 0.2); border-radius: 2px; outline: none;
            writing-mode: vertical-lr; direction: rtl; cursor: pointer;
        }

        .volume-slider-vertical::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 12px; height: 12px;
            border-radius: 50%; background: #ffffff; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);

        }

        /* MODAIS */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px;
        }
        .modal-content { background-color: #222; padding: 30px; border-radius: 12px; max-width: 500px; width: 100%; border: 1px solid #333; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .modal-text { font-size: 14px; line-height: 1.6; color: #eee; margin-top: 10px; }

        /* MODAL DE VERSÕES */
        .version-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .version-card {
            background-color: #2c2c2c;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .version-card:hover {
            background-color: #383838;
            border-color: var(--accent-color);
        }
        .version-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .version-card span {
            font-size: 13px;
            font-weight: 600;
            display: block;
            color: #fff;
        }

        .dashboard-section::-webkit-scrollbar, .right-tracklist-block::-webkit-scrollbar { width: 6px; }
        .dashboard-section::-webkit-scrollbar-thumb, .right-tracklist-block::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @media (max-width: 820px) {
            .dashboard-section { padding: 20px 15px 160px 15px; }
            .album-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }

            .top-nav-bar { padding: 15px 15px 5px 15px; }
            .detail-split-container { display: flex; flex-direction: column; overflow-y: auto; padding: 10px 15px 160px 15px; gap: 25px; }
            .left-album-block { width: 100%; text-align: center; align-items: center; }
            .album-media-container { max-width: 240px; margin: 0 auto 15px auto; }
            .album-description { display: none; }
            .more-btn { display: block; margin: 0 auto 15px auto; }
            .right-tracklist-block { overflow-y: visible; }
            
            .floating-player-wrapper { bottom: 15px; width: 94%; flex-direction: column; gap: 8px; padding: 12px; }
            .center-meta { width: 100%; justify-content: center; }
            .timeline-container { width: 100%; }
            .volume-container { display: none; }
        }
		.switch-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <main>
        <main>
        <section id="dashboardSection" class="dashboard-section">
            <div class="section-header-bar">
                <h1 class="section-title">Discografia Britney Spears</h1>
            </div>
            <div class="album-grid" id="albumGrid"></div>
        </section>

        <section id="albumDetailSection" class="album-detail-section">
            <div class="top-nav-bar">
                <button class="back-btn" onclick="showDashboard()">
                    <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg> Voltar para a Discografia
                </button>
            </div>

            <div class="detail-split-container">
                <div class="left-album-block">
                    <div class="album-media-container">
                        <img id="albumArt" class="album-art" src="" alt="Capa">
                        <video id="albumVideo" class="album-video" loop muted playsinline></video>
                    </div>
                    <div id="albumTitle" class="album-title-header"></div>
                    <div id="albumArtist" class="album-artist-header"></div>
                    <div class="album-meta"></div>
                    <div class="album-description"></div>
                    <button class="play-album-btn" onclick="playAlbumFromStart()">
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Play
                    </button>
                </div>

                <div class="right-tracklist-block">
                    <div class="tracklist" id="tracklist"></div>
                </div>
            </div>
        </section>

        <div class="floating-player-wrapper" id="mainFloatingPlayer">
		<div class="center-meta">
                <img id="miniPlayerArt" class="player-cover-mini" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                <div class="player-song-details">
                    <span id="miniPlayerTitle" class="player-song-title">Não reproduzindo</span>
                    <span id="miniPlayerArtist" class="player-song-artist">-</span>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" onclick="prevTrack()">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="control-btn" onclick="togglePlay()">
                    <svg id="playIcon" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="control-btn" onclick="nextTrack()">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg>
                </button>
                
                <button id="repeatBtn" onclick="toggleRepeatMode()" style="background:none; border:none; color:white; cursor:pointer; font-size:11px; opacity:0.7; margin-left: 10px;">
                    <span id="repeatText">Modo: Off</span>
                </button>
            </div>

            <div class="timeline-container">
                <span id="timeCurrent">0:00</span>
                <div class="progress-bar-bg" id="progressBarBg" onclick="seekAudio(event)">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <span id="timeRemaining">-0:00</span>
            </div>

            <div class="volume-container" id="volumeContainer">
                <button class="volume-btn" onclick="toggleVolumePopover(event)">
                    <svg id="volumeIcon" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                </button>
                <div class="volume-popover" id="volumePopover">
                    <input type="range" class="volume-slider-vertical" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DE TEXTO (SOBRE O ÁLBUM) -->
    <div class="modal-overlay" id="textModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3 style="margin-bottom: 10px;">Sobre o Álbum</h3>
            <p class="modal-text"></p>
        </div>
    </div>

    <!-- MODAL DE VERSÕES -->
    <div class="modal-overlay" id="versionModal" onclick="closeVersionModal()">
        <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 600px;">
            <button class="modal-close" onclick="closeVersionModal()">✕</button>
            <h3 style="margin-bottom: 5px;" id="versionModalTitle">Escolha a Versão</h3>
            <div class="version-grid" id="versionGrid"></div>
        </div>
    </div>

        let selectedAlbum = null;
        let selectedVersion = null;
        let currentTrackIndex = 0;
        let playingAlbum = null; 
		let currentRepeatMode = 0;
        const audio = document.getElementById('audioElement');
        const playIcon = document.getElementById('playIcon');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressBarBg = document.getElementById('progressBarBg');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeRemaining = document.getElementById('timeRemaining');
		function toggleRepeatMode() {
    currentRepeatMode = (currentRepeatMode + 1) % 3;
    const btn = document.getElementById('repeatText');
    if (currentRepeatMode === 0) btn.innerText = "Modo: Off";
    else if (currentRepeatMode === 1) btn.innerText = "Modo: Repetir Álbum";
    else if (currentRepeatMode === 2) btn.innerText = "Modo: Todos Álbuns";
}

        function initApp() {
            renderDashboard();
            audio.volume = 0.8;
            
            document.addEventListener('click', (e) => {
                const container = document.getElementById('volumeContainer');
                const popover = document.getElementById('volumePopover');
                if (container && !container.contains(e.target)) {
                    popover.classList.remove('active');
                }
            });
        }

        function renderDashboard() {
            const grid = document.getElementById('albumGrid');
            grid.innerHTML = '';
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.onclick = () => handleAlbumClick(album);
                card.innerHTML = `
                    <div class="album-art-wrapper">
                        <img src="${album.folder}/${album.cover}" alt="${album.title}">
                    </div>
                    <div class="album-card-title">${album.title}</div>
                    <div class="album-card-artist">${album.artist}</div>
                `;
                grid.appendChild(card);
            });
        }

        function handleAlbumClick(album) {
            if (album.hasVersions) {
                openVersionModal(album);
            } else {
                openAlbum(album, null);
            }
        }

        function openVersionModal(album) {
            const modal = document.getElementById('versionModal');
            const grid = document.getElementById('versionGrid');
            document.getElementById('versionModalTitle').innerText = album.title;
            grid.innerHTML = '';

            album.versions.forEach(ver => {
                const item = document.createElement('div');
                item.className = 'version-card';
                item.onclick = () => {
                    closeVersionModal();
                    openAlbum(album, ver);
                };
                item.innerHTML = `
                    <img src="${album.folder}/${ver.cover}" alt="${ver.versionName}">
                    <span>${ver.versionName}</span>
                `;
                grid.appendChild(item);
            });
            modal.style.display = 'flex';
        }

        function closeVersionModal() {
            document.getElementById('versionModal').style.display = 'none';
        }

        function openAlbum(album, version) {
    selectedAlbum = album;
    selectedVersion = version;

    document.getElementById('dashboardSection').style.display = 'none';
    document.getElementById('albumDetailSection').style.display = 'flex';

    // 1. Define os dados com base na versão ou no álbum padrão
    const title = version ? version.versionName : album.title;
    const coverFile = version ? version.cover : album.cover;
    const videoFile = (version && version.video) ? version.video : (album.video || null);
    const year = version ? version.year : album.year;
    const genre = version ? version.genre : album.genre;
    const description = version ? version.description : album.description;

    // 2. Atualiza os elementos de texto (Garanta que os IDs existam no HTML)
    document.getElementById('albumTitle').innerText = title;
    document.getElementById('albumArtist').innerText = album.artist;
    
    // Atualiza a meta (Gênero e Ano) - Verifique se a classe está correta
    document.querySelector('.album-meta').innerText = `${genre} • ${year}`;
    
    // Atualiza as descrições
    document.querySelector('.album-description').innerText = description;
    document.querySelector('.modal-text').innerText = description;

    // 3. Lógica de Mídia (Capa ou Vídeo)
    const artEl = document.getElementById('albumArt');
const videoEl = document.getElementById('albumVideo');

if (videoFile && videoFile !== "") {
    artEl.style.display = 'none';
    videoEl.style.display = 'block';
    videoEl.src = `${album.folder}/${videoFile}`;
    videoEl.play().catch(err => console.log("Vídeo não carregado:", err));
} else {
    videoEl.style.display = 'none';
    videoEl.pause();
    videoEl.src = "";
    
    artEl.src = `${album.folder}/${coverFile}`;
    artEl.style.display = 'block';
}

    renderTracklist();
}

       function renderTracklist() {
    const tracklistEl = document.getElementById('tracklist');
    tracklistEl.innerHTML = '';
    
    // Se houver uma versão selecionada, usa as tracks dela; senão, usa a padrão
    const tracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : selectedAlbum.tracks;

    tracks.forEach((track, index) => {
        const row = document.createElement('div');
        row.className = 'track-row';
        row.id = `track-${index}`;
        row.onclick = () => playTrack(index);
        row.innerHTML = `<div class="track-number">${track.num}</div><div class="track-title">${track.title}</div>`;
        tracklistEl.appendChild(row);
    });
    updateTracklistVisuals();
}

        function showDashboard() {
            selectedAlbum = null;
            selectedVersion = null;
            const videoEl = document.getElementById('albumVideo');
            videoEl.pause();
            videoEl.src = "";

            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('albumDetailSection').style.display = 'none';
        }

     function playTrack(index) {
    currentTrackIndex = index;
    playingAlbum = selectedAlbum;
    
    // Define a lista correta
    const trackList = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : playingAlbum.tracks;
    const track = trackList[index];

    document.getElementById('mainFloatingPlayer').style.display = 'flex';
    
    // ATUALIZAÇÃO: Busca o cover da versão ou do álbum
    const activeCover = selectedVersion ? selectedVersion.cover : playingAlbum.cover;
    document.getElementById('miniPlayerArt').src = `${playingAlbum.folder}/${activeCover}`;
    
    // ATUALIZAÇÃO: Exibe título e artista
    document.getElementById('miniPlayerTitle').innerText = track.title;
    document.getElementById('miniPlayerArtist').innerText = playingAlbum.artist;

    audio.src = `${playingAlbum.folder}/${track.file}`; 
    audio.play();

    updatePlayButton(true);
    updateTracklistVisuals();
}

        function playAlbumFromStart() {
            if (selectedAlbum) playTrack(0);
        }

        function togglePlay() {
            if (!audio.src) {
                if(albums.length > 0) {
                    handleAlbumClick(albums[0]);
                }
                return;
            }
            if (audio.paused) {
                audio.play().catch(err => console.log(err));
                updatePlayButton(true);
            } else {
                audio.pause();
                updatePlayButton(false);
            }
            updateTracklistVisuals();
        }

        function updatePlayButton(isPlaying) {
            if (isPlaying) {
                playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            } else {
                playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            }
        }

        function updateTracklistVisuals() {
            document.querySelectorAll('.track-row').forEach(row => row.classList.remove('playing'));
            if (playingAlbum && selectedAlbum && playingAlbum.id === selectedAlbum.id) {
                const activeRow = document.getElementById(`track-${currentTrackIndex}`);
                if (activeRow && !audio.paused) {
                    activeRow.classList.add('playing');
                }
            }
        }

function nextTrack() {
    if (!playingAlbum) return;
    const trackList = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : playingAlbum.tracks;
    
    if (currentTrackIndex < trackList.length - 1) {
        playTrack(currentTrackIndex + 1);
    } else {
        if (currentRepeatMode === 1) {
            playTrack(0);
        } else if (currentRepeatMode === 2) {
            const albumIndex = albums.findIndex(a => a.id === playingAlbum.id);
            if (albumIndex < albums.length - 1) {
                const nextAlbum = albums[albumIndex + 1];
                const targetVersion = nextAlbum.hasVersions ? 
                    nextAlbum.versions.reduce((prev, curr) => (curr.tracks.length > prev.tracks.length) ? curr : prev) : null;
                openAlbum(nextAlbum, targetVersion);
                setTimeout(() => playTrack(0), 500);
            } else {
                audio.pause();
                updatePlayButton(false);
            }
        } else {
            audio.pause();
            updatePlayButton(false);
        }
    }
}

function prevTrack() {
    if (!playingAlbum) return;
    const trackList = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : playingAlbum.tracks;
    
    currentTrackIndex--;
    if (currentTrackIndex < 0) {
        currentTrackIndex = trackList.length - 1;
    }
    playTrack(currentTrackIndex);
}

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBarFill.style.width = `${percent}%`;
            timeCurrent.innerText = formatTime(audio.currentTime);
            timeRemaining.innerText = "-" + formatTime(audio.duration - audio.currentTime);
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function seekAudio(event) {
            if (!audio.src || !audio.duration) return;
            const rect = progressBarBg.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            audio.currentTime = (clickX / rect.width) * audio.duration;
        }

        function toggleVolumePopover(event) {
            event.stopPropagation();
            const popover = document.getElementById('volumePopover');
            popover.classList.toggle('active');
        }

        function setVolume(value) { 
            audio.volume = value; 
            const volumeIcon = document.getElementById('volumeIcon');
            
            if (parseFloat(value) === 0) {
                volumeIcon.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
            } else if (parseFloat(value) < 0.5) {
                volumeIcon.innerHTML = `<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>`;
            } else {
                volumeIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
            }
			
			
        }

        audio.addEventListener('ended', nextTrack);
        function openModal() { document.getElementById('textModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('textModal').style.display = 'none'; }
		function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }
        initApp();
