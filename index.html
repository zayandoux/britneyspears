<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        :root {
            --bg-color: #121212;
            --sidebar-color: #1a1a1a;
            --card-bg: #242424;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #ff2d55; 
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        /* Lateral (Sidebar) - Escondida no Mobile por padrão */
        aside {
            width: 260px;
            background-color: var(--sidebar-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* Topo exclusivo para Mobile (só aparece em telas menores) */
        .mobile-header {
            display: none;
            background-color: var(--sidebar-color);
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 99;
        }

        .mobile-header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
            transition: var(--transition);
        }

        .menu-item:hover, .menu-item.active {
            background-color: #2c2c2e;
            color: var(--text-main);
        }

        .menu-item.active {
            color: var(--accent-color);
        }

        /* Container Principal */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            padding-bottom: 120px; /* Espaço para o player */
        }

        /* Dashboard (Grade de Álbuns) */
        .dashboard-section {
            display: block;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .album-card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .album-card:hover {
            transform: translateY(-5px);
            background-color: #2d2d2d;
            border-color: #3a3a3c;
        }

        .album-art-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .album-art-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-title {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .album-artist {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Detalhes do Álbum (Lista de Músicas) */
        .album-detail-section {
            display: none; 
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .album-header {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
            align-items: flex-end;
        }

        .album-header-art {
            width: 220px;
            height: 220px;
            border-radius: var(--border-radius);
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .album-header-info h2 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .album-header-info p {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Lista de faixas */
        .tracklist {
            display: flex;
            flex-direction: column;
        }

        .track-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .track-row:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .track-row:active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .track-row.playing {
            color: var(--accent-color);
            background-color: rgba(255, 45, 85, 0.08);
        }

        .track-number {
            width: 40px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .track-row.playing .track-number {
            color: var(--accent-color);
        }

        .track-title {
            flex: 1;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        /* Barra do Player de Música (Fixo no rodapé) */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background-color: rgba(26, 26, 26, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 30%;
        }

        .player-album-art {
            width: 55px;
            height: 55px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #2c2c2e;
        }

        .player-song-info {
            overflow: hidden;
        }

        .player-song-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-song-artist {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .player-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 8px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: var(--accent-color);
        }

        .control-btn.play-pause {
            background-color: var(--text-main);
            color: var(--bg-color);
            width: 38px;
            height: 38px;
            border-radius: 50%;
        }

        .control-btn.play-pause:hover {
            background-color: var(--accent-color);
            color: white;
            transform: scale(1.05);
        }

        .progress-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        .time-label {
            font-size: 11px;
            color: var(--text-muted);
            width: 35px;
            text-align: center;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background-color: #48484a;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--text-main);
            border-radius: 2px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .progress-bar:hover .progress-fill {
            background-color: var(--accent-color);
        }

        .player-right {
            width: 30%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        /* ----------------------------------------- */
        /* RESPONSIVIDADE (MEDIA QUERIES PARA CELULAR) */
        /* ----------------------------------------- */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* Organização vertical no celular */
            }

            /* Esconde sidebar clássica */
            aside {
                display: none;
            }

            /* Ativa cabeçalho mobile fixo no topo */
            .mobile-header {
                display: block;
            }

            /* Empurra o conteúdo principal para baixo para não ficar sob o topo fixo */
            main {
                padding: 85px 15px 150px 150px; /* Ajuste do padding */
                padding-left: 15px;
                padding-right: 15px;
            }

            /* Ajuste do grid de álbuns no mobile */
            .album-grid {
                grid-template-columns: repeat(2, 1fr); /* Força 2 colunas no celular */
                gap: 15px;
            }

            .album-card {
                padding: 10px;
            }

            .album-title {
                font-size: 14px;
            }

            .album-artist {
                font-size: 12px;
            }

            /* Tela de Detalhes do Álbum no Mobile */
            .album-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 20px;
                margin-bottom: 30px;
            }

            .album-header-art {
                width: 180px;
                height: 180px;
            }

            .album-header-info h2 {
                font-size: 26px;
            }

            .album-header-info p {
                font-size: 15px;
                margin-bottom: 0;
            }

            .track-row {
                padding: 16px 10px; /* Toque mais fácil no dedo */
            }

            /* --- O Player Redesenhado para Celular --- */
            .player-bar {
                height: 100px;
                padding: 10px 15px;
                flex-wrap: wrap; /* Permite quebrar em linhas se necessário */
                align-items: center;
            }

            /* Ocupa a largura inteira no topo do player para dar espaço para a barra de tempo */
            .progress-container {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                padding: 0;
                gap: 0;
            }

            .progress-bar {
                height: 3px;
                border-radius: 0;
                background-color: #2a2a2a;
            }

            .progress-fill {
                border-radius: 0;
                background-color: var(--accent-color);
            }

            /* Esconde as minutagens do player no mobile para manter limpo */
            .time-label {
                display: none;
            }

            /* Informações da música ganham mais espaço */
            .player-left {
                width: 65%;
                gap: 10px;
            }

            .player-album-art {
                width: 45px;
                height: 45px;
            }

            .player-song-title {
                font-size: 13px;
            }

            /* Controles alinhados à direita */
            .player-center {
                width: 35%;
                flex-direction: row;
                justify-content: flex-end;
            }

            .player-controls {
                margin-bottom: 0;
                gap: 15px;
            }

            /* Esconde o botão "Anterior" e "Próximo" em telas muito pequenas para focar no Play/Pause */
            .control-btn:not(.play-pause) {
                display: none; 
            }

            .control-btn.play-pause {
                width: 44px; /* Dedos maiores no mobile */
                height: 44px;
            }

            /* Esconde controle de volume no mobile (o celular já tem botões físicos de volume) */
            .player-right {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header class="mobile-header">
        <div class="mobile-header-title">Música</div>
    </header>

    <aside>
        <div class="brand-title">Música</div>
        <div class="menu-item active" onclick="showDashboard()">
            <svg style="margin-right: 12px;" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Início / Dashboard
        </div>
    </aside>

    <main>
        <section id="dashboardSection" class="dashboard-section">
            <h1 class="section-title">Álbuns</h1>
            <div class="album-grid" id="albumGrid">
                </div>
        </section>

        <section id="albumDetailSection" class="album-detail-section">
            <button class="back-btn" onclick="showDashboard()">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg> Voltar para Álbuns
            </button>
            
            <div class="album-header">
                <img id="detailAlbumArt" src="" class="album-header-art" alt="Capa do Álbum">
                <div class="album-header-info">
                    <h2 id="detailAlbumTitle"></h2>
                    <p id="detailAlbumArtist"></p>
                </div>
            </div>

            <div class="tracklist" id="tracklist">
                </div>
        </section>
    </main>

    <div class="player-bar">
        <div class="progress-container">
            <span class="time-label" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time-label" id="durationTime">0:00</span>
        </div>

        <div class="player-left">
            <img id="playerArt" class="player-album-art" src="450x600bb.webp" alt="Sem mídia">
            <div class="player-song-info">
                <div id="playerTitle" class="player-song-title">Nenhuma música selecionada</div>
                <div id="playerArtist" class="player-song-artist">-</div>
            </div>
        </div>

        <div class="player-center">
            <div class="player-controls">
                <button class="control-btn" onclick="prevTrack()">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="control-btn play-pause" id="playBtn" onclick="togglePlay()">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="control-btn" onclick="nextTrack()">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg>
                </button>
            </div>
        </div>

        <div class="player-right">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)">
        </div>
    </div>

    <audio id="audioElement"></audio>

    <script>
        const albums = [
            {
                id: "baby-one-more-time",
                title: "Baby One More Time",
                artist: "Britney Spears",
                cover: "450x600bb.webp",
                tracks: [
                    { num: "01", title: "Baby One More Time", file: "01 - Britney Spears - Baby One More Time.mp3" },
                    { num: "02", title: "Crazy (You Drive Me)", file: "02 - Britney Spears - Crazy (You Drive Me).mp3" },
                    { num: "03", title: "Sometimes", file: "03 - Britney Spears - Sometimes.mp3" },
                    { num: "04", title: "Soda Pop", file: "04 - Britney Spears - Soda Pop.mp3" },
                    { num: "05", title: "Born To Make You Happy", file: "05 - Britney Spears - Born To Make You Happy.mp3" },
                    { num: "06", title: "From The Bottom Of My Broken Heart", file: "06 - Britney Spears - From The Bottom Of My Broken Heart.mp3" },
                    { num: "07", title: "I Will Be There", file: "07 - Britney Spears - I Will Be There.mp3" },
                    { num: "08", title: "I Will Still Love You (Duet With Don Philip)", file: "08 - Britney Spears - I Will Still Love You (Duet With Don Philip).mp3" },
                    { num: "09", title: "Deep In My Heart", file: "09 - Britney Spears - Deep In My Heart.mp3" },
                    { num: "10", title: "Thinkin' About You", file: "10 - Britney Spears - Thinkin' About You.mp3" },
                    { num: "11", title: "E-Mail My Heart", file: "11 - Britney Spears - E-Mail My Heart.mp3" },
                    { num: "12", title: "The Beat Goes On", file: "12 - Britney Spears - The Beat Goes On.mp3" },
                    { num: "13", title: "I'll Never Stop Loving You", file: "13 - Britney Spears - I'll Never Stop Loving You.mp3" },
                    { num: "14", title: "Autumn Goodbye", file: "14 - Britney Spears - Autumn Goodbye.mp3" },
                    { num: "15", title: "Baby One More Time (Davidson Ospina Radio Mix)", file: "15 - Britney Spears - Baby One More Time (Davidson Ospina Radio Mix).mp3" },
                    { num: "16", title: "Baby One More Time (Boy Wunder Radio Mix)", file: "16 - Britney Spears - Baby One More Time (Boy Wunder Radio Mix).mp3" }
                ]
            }
        ];

        let currentAlbum = null;
        let currentTrackIndex = 0;
        const audio = document.getElementById('audioElement');
        const playIcon = document.getElementById('playIcon');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');

        function initDashboard() {
            const grid = document.getElementById('albumGrid');
            grid.innerHTML = '';
            
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.onclick = () => openAlbum(album);
                card.innerHTML = `
                    <div class="album-art-wrapper">
                        <img src="${album.cover}" alt="${album.title}">
                    </div>
                    <div class="album-title">${album.title}</div>
                    <div class="album-artist">${album.artist}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openAlbum(album) {
            currentAlbum = album;
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('albumDetailSection').style.display = 'block';

            document.getElementById('detailAlbumArt').src = album.cover;
            document.getElementById('detailAlbumTitle').innerText = album.title;
            document.getElementById('detailAlbumArtist').innerText = album.artist;

            const tracklistEl = document.getElementById('tracklist');
            tracklistEl.innerHTML = '';

            album.tracks.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = `track-row ${isCurrentTrack(album, index) ? 'playing' : ''}`;
                row.id = `track-${index}`;
                row.onclick = () => playTrack(album, index);
                row.innerHTML = `
                    <div class="track-number">${track.num}</div>
                    <div class="track-title">${track.title}</div>
                `;
                tracklistEl.appendChild(row);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showDashboard() {
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('albumDetailSection').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function isCurrentTrack(album, index) {
            return audio.src.includes(encodeURIComponent(album.tracks[index].file)) && !audio.paused;
        }

        function playTrack(album, index) {
            currentAlbum = album;
            currentTrackIndex = index;
            const track = album.tracks[index];

            document.getElementById('playerArt').src = album.cover;
            document.getElementById('playerTitle').innerText = track.title;
            document.getElementById('playerArtist').innerText = album.artist;

            audio.src = track.file;
            audio.play();
            
            updateTracklistVisuals();
            updatePlayButton(true);
        }

        function togglePlay() {
            if (!audio.src) {
                if (albums.length > 0) playTrack(albums[0], 0);
                return;
            }

            if (audio.paused) {
                audio.play();
                updatePlayButton(true);
            } else {
                audio.pause();
                updatePlayButton(false);
            }
            updateTracklistVisuals();
        }

        function updatePlayButton(isPlaying) {
            if (isPlaying) {
                playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            } else {
                playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            }
        }

        function updateTracklistVisuals() {
            document.querySelectorAll('.track-row').forEach(row => {
                row.classList.remove('playing');
            });

            if (currentAlbum) {
                const currentActiveRow = document.getElementById(`track-${currentTrackIndex}`);
                if (currentActiveRow && !audio.paused) {
                    currentActiveRow.classList.add('playing');
                }
            }
        }

        function nextTrack() {
            if (!currentAlbum) return;
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= currentAlbum.tracks.length) {
                nextIndex = 0;
            }
            playTrack(currentAlbum, nextIndex);
        }

        function prevTrack() {
            if (!currentAlbum) return;
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) {
                prevIndex = currentAlbum.tracks.length - 1;
            }
            playTrack(currentAlbum, prevIndex);
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                
                currentTimeEl.innerText = formatTime(audio.currentTime);
                durationTimeEl.innerText = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            nextTrack();
        });

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function seek(event) {
            if (!audio.duration) return;
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const width = rect.width;
            const clickPercent = clickX / width;
            audio.currentTime = clickPercent * audio.duration;
        }

        function changeVolume(value) {
            audio.volume = value;
        }

        initDashboard();
    </script>
</body>
</html>
