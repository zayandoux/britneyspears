<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discografia Britney Spears</title>
    <style>
        :root {
            --bg-color: #161616;
            --card-bg: #242424;
            --text-main: #ffffff;
            --text-muted: #8a8a8e;
            --accent-color: #fa233b; 
            --border-radius: 12px;
            --player-bg: rgba(35, 35, 35, 0.9);
            --glass-bg: rgba(22, 22, 22, 0.7);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* SEÇÃO 1: DASHBOARD (TELA INICIAL) */
        .dashboard-section {
            display: block;
            padding: 40px;
            overflow-y: auto;
            height: 100%;
            padding-bottom: 160px;
        }

        .section-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .album-card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .album-card:hover {
            transform: translateY(-5px);
            background-color: #2d2d2d;
            border-color: #3a3a3c;
        }

        .album-art-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .album-art-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .album-card-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .album-card-artist {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* SEÇÃO 2: DETALHES DO ÁLBUM (CABEÇALHO FIXO) */
        .album-detail-section {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .sticky-album-header {
            background-color: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 40px 30px 40px;
            display: flex;
            gap: 40px;
            align-items: flex-start;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            background: none; border: none;
            color: var(--accent-color);
            font-size: 14px; font-weight: 600;
            cursor: pointer; margin-bottom: 15px;
            display: inline-flex; align-items: center; gap: 4px;
        }

        /* CAPA 50% MAIOR (Subiu de 190px para ~285px) */
        .album-art {
            width: 285px; 
            height: 285px;
            border-radius: 12px; 
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        .album-info-block {
            display: flex; 
            flex-direction: column;
            justify-content: center;
            margin-top: 25px;
        }

        .album-title-header {
            font-size: 32px; 
            font-weight: 800;
            margin-bottom: 6px; 
            letter-spacing: -0.5px;
        }

        .album-artist-header {
            font-size: 22px; 
            color: var(--accent-color);
            font-weight: 600; 
            margin-bottom: 6px;
        }

        .album-meta {
            font-size: 13px; 
            color: var(--text-muted); 
            margin-bottom: 15px;
        }

        .album-description {
            font-size: 14px; 
            color: #cccccc; 
            line-height: 1.6;
            max-width: 750px; 
            display: -webkit-box;
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical;  
            overflow: hidden; 
            margin-bottom: 15px;
        }

        .more-btn {
            color: #ffffff; font-weight: 700; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
            border: none; background: none; letter-spacing: 0.5px;
        }

        .play-album-btn {
            background-color: #ffffff; color: #000000; border: none;
            padding: 12px 28px; border-radius: 24px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 10px; width: fit-content; transition: transform 0.2s;
        }

        .play-album-btn:hover { transform: scale(1.02); }

        .scrollable-content {
            flex: 1; overflow-y: auto;
            padding: 20px 40px 160px 40px; 
        }

        .tracklist {
            display: flex; flex-direction: column; width: 100%; max-width: 1200px;
        }

        .track-row {
            display: flex; align-items: center; padding: 14px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer; border-radius: 6px; transition: background-color 0.2s;
        }

        .track-row:hover { background-color: rgba(255, 255, 255, 0.04); }
        .track-row.playing { background-color: #8e001c !important; color: #ffffff; }

        .track-number { width: 40px; color: var(--text-muted); font-size: 14px; }
        .track-row.playing .track-number { color: rgba(255, 255, 255, 0.7); }
        .track-title { flex: 1; font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER FLUTUANTE EXPANDIDO (COM BARRA DE TEMPO E VOLUME) */
        .floating-player-wrapper {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 92%; max-width: 800px;
            background-color: var(--player-bg); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 12px 20px; display: flex;
            align-items: center; gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); z-index: 100;
        }

        .player-controls { display: flex; align-items: center; gap: 14px; }
        .control-btn { background: none; border: none; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.85; transition: opacity 0.2s; }
        .control-btn:hover { opacity: 1; }

        .center-meta { display: flex; align-items: center; gap: 12px; width: 180px; overflow: hidden; flex-shrink: 0; }
        .player-cover-mini { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .player-song-details { overflow: hidden; display: flex; flex-direction: column; }
        .player-song-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-song-artist { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

        /* LINHA DE PROGRESSO (TIMELINE) */
        .timeline-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            min-width: 150px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        
        .progress-bar-bg:hover {
            height: 6px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            border-radius: 2px;
            position: absolute;
            top: 0; left: 0;
        }

        /* CONTROLE DE VOLUME */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 110px;
            flex-shrink: 0;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            height: 4px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        /* MODAL POP-UP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px;
        }
        .modal-content { background-color: #222; padding: 30px; border-radius: 12px; max-width: 500px; width: 100%; border: 1px solid #333; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .modal-text { font-size: 14px; line-height: 1.6; color: #eee; margin-top: 10px; }

        .dashboard-section::-webkit-scrollbar, .scrollable-content::-webkit-scrollbar { width: 6px; }
        .dashboard-section::-webkit-scrollbar-thumb, .scrollable-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* MOBILE */
        @media (max-width: 768px) {
            .dashboard-section { padding: 20px 15px 160px 15px; }
            .album-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }

            .sticky-album-header { padding: 20px 15px; gap: 20px; flex-direction: column; }
            .album-art { width: 100%; height: auto; max-width: 240px; margin: 0 auto; }
            .album-info-block { margin-top: 5px; text-align: center; align-items: center; }
            .album-title-header { font-size: 22px; }
            .album-artist-header { font-size: 18px; }
            .album-description { display: none; }
            .more-btn { display: block; margin-bottom: 8px; }
            .scrollable-content { padding: 10px 15px 160px 15px; }
            
            .floating-player-wrapper { bottom: 15px; width: 94%; flex-direction: column; gap: 8px; padding: 12px; }
            .center-meta { width: 100%; justify-content: center; }
            .timeline-container { width: 100%; }
            .volume-container { display: none; } /* Esconde volume no celular para poupar espaço */
        }
    </style>
</head>
<body>

    <main>
        <!-- TELA 1: DASHBOARD (TELA INICIAL DISCOGRAFIA) -->
        <section id="dashboardSection" class="dashboard-section">
            <div class="section-header-bar">
                <h1 class="section-title">Discografia Britney Spears</h1>
            </div>
            <div class="album-grid" id="albumGrid">
                <!-- Cards injetados por JS -->
            </div>
        </section>

        <!-- TELA 2: DETALHES DO ÁLBUM (CABEÇALHO VIDRO FIXO + CAPA +50%) -->
        <section id="albumDetailSection" class="album-detail-section">
            <div class="sticky-album-header">
                <div style="width: 100%; display: block; position: absolute; top: 15px; left: 40px;">
                    <button class="back-btn" onclick="showDashboard()">
                        <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg> Voltar para a Discografia
                    </button>
                </div>
                <img id="albumArt" class="album-art" src="" alt="Capa">
                <div class="album-info-block">
                    <div id="albumTitle" class="album-title-header"></div>
                    <div id="albumArtist" class="album-artist-header"></div>
                    <div class="album-meta"></div>
                    
                    <div class="album-description"></div>
                    <button class="more-btn" onclick="openModal()">Mais</button>
                    
                    <button class="play-album-btn" onclick="playAlbumFromStart()">
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Play
                    </button>
                </div>
            </div>

            <div class="scrollable-content">
                <div class="tracklist" id="tracklist">
                    <!-- Injetado por JS -->
                </div>
            </div>
        </section>

        <!-- PLAYER FLUTUANTE CENTRALIZADO COM CONTROLES COMPLETOS -->
        <div class="floating-player-wrapper">
            <div class="player-controls">
                <button class="control-btn" onclick="prevTrack()">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="control-btn" onclick="togglePlay()">
                    <svg id="playIcon" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="control-btn" onclick="nextTrack()">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg>
                </button>
            </div>

            <div class="center-meta">
                <img id="miniPlayerArt" class="player-cover-mini" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                <div class="player-song-details">
                    <span id="miniPlayerTitle" class="player-song-title">Não reproduzindo</span>
                    <span id="miniPlayerArtist" class="player-song-artist">-</span>
                </div>
            </div>

            <!-- BARRA DE PROGRESSO E TEMPOS DA MÚSICA -->
            <div class="timeline-container">
                <span id="timeCurrent">0:00</span>
                <div class="progress-bar-bg" id="progressBarBg" onclick="seekAudio(event)">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <span id="timeRemaining">-0:00</span>
            </div>

            <!-- CONTROLE DE VOLUME -->
            <div class="volume-container">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
            </div>
        </div>
    </main>

    <!-- POP-UP MODAL (MAIS INFORMAÇÕES) -->
    <div class="modal-overlay" id="textModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3 style="margin-bottom: 10px;">Sobre o Álbum</h3>
            <p class="modal-text"></p>
        </div>
    </div>

    <audio id="audioElement"></audio>

    <script>
        const albums = [
            {
                id: "baby-one-more-time",
                folder: "01 - Baby One More Time", 
                title: "...Baby One More Time",
                artist: "Britney Spears",
                cover: "450x600bb.webp",
                year: "1999",
                genre: "Pop",
                description: '"...Baby One More Time" de Britney Spears não começa apenas, ele se anuncia: Seus primeiros segundos combinam um piano forte, guitarra wah-wah e o "baby, baby" cheio de atitude da estrela teen-pop em um momento que é parte grito de guerra, parte apelo ansioso. A audaciosa introdução de seu primeiro single — a faixa-título de sua estreia completa — foi uma apresentação apropriada para a mulher que eventualmente se tornaria o rosto do pop adolescente dos anos 2000, misturando angústia na medida certa com refrões que grudam no cérebro, batidas marcantes e o carisma inegável de Spears.',
                tracks: [
                    { num: "1", title: "...Baby One More Time", file: "01 - Britney Spears - Baby One More Time.mp3" },
                    { num: "2", title: "(You Drive Me) Crazy", file: "02 - Britney Spears - Crazy (You Drive Me).mp3" },
                    { num: "3", title: "Sometimes", file: "03 - Britney Spears - Sometimes.mp3" },
                    { num: "4", title: "Soda Pop", file: "04 - Britney Spears - Soda Pop.mp3" },
                    { num: "5", title: "Born To Make You Happy", file: "05 - Britney Spears - Born To Make You Happy.mp3" },
                    { num: "6", title: "From The Bottom Of My Broken Heart", file: "06 - Britney Spears - From The Bottom Of My Broken Heart.mp3" },
                    { num: "7", title: "I Will Be There", file: "07 - Britney Spears - I Will Be There.mp3" },
                    { num: "8", title: "I Will Still Love You (Duet With Don Philip)", file: "08 - Britney Spears - I Will Still Love You (Duet With Don Philip).mp3" },
                    { num: "9", title: "Deep In My Heart", file: "09 - Britney Spears - Deep In My Heart.mp3" },
                    { num: "10", title: "Thinkin' About You", file: "10 - Britney Spears - Thinkin' About You.mp3" },
                    { num: "11", title: "E-Mail My Heart", file: "11 - Britney Spears - E-Mail My Heart.mp3" },
                    { num: "12", title: "The Beat Goes On", file: "12 - Britney Spears - The Beat Goes On.mp3" },
                    { num: "13", title: "I'll Never Stop Loving You", file: "13 - Britney Spears - I'll Never Stop Loving You.mp3" },
                    { num: "14", title: "Autumn Goodbye", file: "14 - Britney Spears - Autumn Goodbye.mp3" },
                    { num: "15", title: "Baby One More Time (Davidson Ospina Radio Mix)", file: "15 - Britney Spears - Baby One More Time (Davidson Ospina Radio Mix).mp3" },
                    { num: "16", title: "Baby One More Time (Boy Wunder Radio Mix)", file: "16 - Britney Spears - Baby One More Time (Boy Wunder Radio Mix).mp3" }
                ]
            }
        ];

        let selectedAlbum = null;
        let currentTrackIndex = 0;
        let playingAlbum = null; 
        const audio = document.getElementById('audioElement');
        const playIcon = document.getElementById('playIcon');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressBarBg = document.getElementById('progressBarBg');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeRemaining = document.getElementById('timeRemaining');

        function initApp() {
            renderDashboard();
            audio.volume = 0.8; // Inicializa volume padrão alto
        }

        function renderDashboard() {
            const grid = document.getElementById('albumGrid');
            grid.innerHTML = '';
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.onclick = () => openAlbum(album);
                card.innerHTML = `
                    <div class="album-art-wrapper">
                        <img src="${album.folder}/${album.cover}" alt="${album.title}">
                    </div>
                    <div class="album-card-title">${album.title}</div>
                    <div class="album-card-artist">${album.artist}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openAlbum(album) {
            selectedAlbum = album;
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('albumDetailSection').style.display = 'flex';

            const fullCoverPath = `${album.folder}/${album.cover}`;
            document.getElementById('albumArt').src = fullCoverPath;
            document.getElementById('albumTitle').innerText = album.title;
            document.getElementById('albumArtist').innerText = album.artist;
            document.querySelector('.album-meta').innerText = `${album.genre} • ${album.year}`;
            document.querySelector('.album-description').innerText = album.description;
            document.querySelector('.modal-text').innerText = album.description;

            const tracklistEl = document.getElementById('tracklist');
            tracklistEl.innerHTML = '';

            album.tracks.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = 'track-row';
                row.id = `track-${index}`;
                row.onclick = () => playTrack(index);
                row.innerHTML = `
                    <div class="track-number">${track.num}</div>
                    <div class="track-title">${track.title}</div>
                `;
                tracklistEl.appendChild(row);
            });
            updateTracklistVisuals();
        }

        function showDashboard() {
            selectedAlbum = null;
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('albumDetailSection').style.display = 'none';
        }

        function playTrack(index) {
            currentTrackIndex = index;
            playingAlbum = selectedAlbum; 
            const track = playingAlbum.tracks[index];

            const fullCoverPath = `${playingAlbum.folder}/${playingAlbum.cover}`;
            const fullAudioPath = `${playingAlbum.folder}/${track.file}`;

            document.getElementById('miniPlayerArt').src = fullCoverPath;
            document.getElementById('miniPlayerTitle').innerText = track.title;
            document.getElementById('miniPlayerArtist').innerText = playingAlbum.artist;

            audio.src = fullAudioPath;
            audio.play();

            updatePlayButton(true);
            updateTracklistVisuals();
        }

        function playAlbumFromStart() {
            playTrack(0);
        }

        function togglePlay() {
            if (!audio.src) {
                if(albums.length > 0) {
                    selectedAlbum = albums[0];
                    playAlbumFromStart();
                }
                return;
            }
            if (audio.paused) {
                audio.play();
                updatePlayButton(true);
            } else {
                audio.pause();
                updatePlayButton(false);
            }
            updateTracklistVisuals();
        }

        function updatePlayButton(isPlaying) {
            if (isPlaying) {
                playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            } else {
                playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            }
        }

        function updateTracklistVisuals() {
            document.querySelectorAll('.track-row').forEach(row => row.classList.remove('playing'));
            if (playingAlbum && selectedAlbum && playingAlbum.id === selectedAlbum.id) {
                const activeRow = document.getElementById(`track-${currentTrackIndex}`);
                if (activeRow && !audio.paused) {
                    activeRow.classList.add('playing');
                }
            }
        }

        function nextTrack() {
            if (!playingAlbum) return;
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= playingAlbum.tracks.length) nextIndex = 0;
            selectedAlbum = playingAlbum;
            playTrack(nextIndex);
        }

        function prevTrack() {
            if (!playingAlbum) return;
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = playingAlbum.tracks.length - 1;
            selectedAlbum = playingAlbum;
            playTrack(prevIndex);
        }

        // ATUALIZAR BARRA DE PROGRESSO E TEMPOS DINAMICAMENTE
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;

            // Calcula porcentagem da barra
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBarFill.style.width = `${percent}%`;

            // Formata tempo decorrido (ex: 1:23)
            timeCurrent.innerText = formatTime(audio.currentTime);

            // Formata tempo restante (ex: -2:45)
            const remaining = audio.duration - audio.currentTime;
            timeRemaining.innerText = "-" + formatTime(remaining);
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // PERMITIR CLICAR NA BARRA PARA AVANÇAR/RETROCEDER MÚSICA
        function seekAudio(event) {
            if (!audio.src || !audio.duration) return;
            const rect = progressBarBg.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const width = rect.width;
            const newTime = (clickX / width) * audio.duration;
            audio.currentTime = newTime;
        }

        // CONTROLE DE VOLUME
        function setVolume(value) {
            audio.volume = value;
        }

        audio.addEventListener('ended', nextTrack);
        function openModal() { document.getElementById('textModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('textModal').style.display = 'none'; }

        initApp();
    </script>
</body>
</html>
